name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to Hostinger VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_PROJECT_PATH }}"

            echo "==> Current commit before pull:"
            git rev-parse --short HEAD || true

            echo "==> Fetching latest from origin/main"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> New commit after pull:"
            git rev-parse --short HEAD

            echo "==> Installing production dependencies"
            npm ci --omit=dev || npm install --omit=dev

            echo "==> Reloading PM2 process 'tfr'"
            pm2 reload tfr --update-env

            echo "==> Granting bundle access (one-shot)"
            node scripts/grant-bundle-once.js || true

            echo "==> PM2 status"
            pm2 list

            echo "==> Deploy complete"
