<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/assets/tfr-play/favicon-tfr.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<!-- v2-prejoin --><title>Live Class Room — The Foundation Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080706; --bg-2:#0F0D0B; --bg-card:#161412; --bg-elevated:#1E1B17;
    --gold:#C8A84B; --gold-bright:#E8C96E; --text:#F0E6D3; --text-2:#B8A898; --text-3:#6B5E50;
    --ruby:#C8362A; --emerald:#3E8E5A;
    --serif:'Libre Baskerville',Georgia,serif; --sans:'DM Sans',system-ui,sans-serif;
  }
  *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:#000; color:var(--text); font-family:var(--sans); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
  .topbar{ background:var(--bg-2); border-bottom:1px solid rgba(200,168,75,.16); padding:10px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .topbar img{ height:24px; }
  .topbar .info{ font-size:13px; color:var(--text-2); }
  .topbar .info b{ color:var(--gold); }
  .btn{ padding:7px 14px; background:transparent; border:1px solid rgba(200,168,75,.32); color:var(--text); border-radius:5px; cursor:pointer; font-size:12px; font-family:var(--sans); font-weight:600; text-decoration:none; display:inline-block; }
  .btn-danger{ border-color:rgba(200,54,42,.4); color:var(--ruby); }
  .room{ flex:1; position:relative; background:#000; }
  #jitsi-container{ width:100%; height:100%; }
  .external-meet{ display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding:40px; text-align:center; }
  .external-meet h2{ font-family:var(--serif); color:var(--gold); font-size:28px; font-weight:400; margin-bottom:14px; }
  .external-meet p{ color:var(--text-2); font-size:14px; max-width:520px; line-height:1.7; margin-bottom:24px; }
  .external-meet .open-btn{ padding:14px 36px; background:var(--gold); color:#080706; border:none; border-radius:8px; font-size:14px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; font-family:var(--sans); }
  .external-meet .open-btn:hover{ background:var(--gold-bright); }
  .loading{ display:flex; align-items:center; justify-content:center; height:100%; color:var(--text-3); font-style:italic; }
  .error{ color:var(--ruby); padding:40px; text-align:center; }
</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="/"><img src="/assets/tfr-play/tfr-logo-main.png" alt="TFR"></a>
    <div class="info" id="info">Loading session…</div>
  </div>
  <div style="display:flex;gap:8px;">
    <a href="/my-live-classes.html" class="btn">← Back</a>
    <button class="btn btn-danger" onclick="leaveRoom()">Leave Class</button>
  </div>
</div>

<div class="room" id="room"><div class="loading">Preparing classroom…</div></div>

<script src="https://meet.tfrplay.com/external_api.js" defer></script>
<script>
  (function(){
    const t = localStorage.getItem('archive_token');
    if (!t) { window.location.replace('/signin.html'); return; }
  })();

  function getJoinParams(){
    const p = new URLSearchParams(location.search);
    return { bookingId: p.get('b'), slotId: p.get('s') };  // STRICT_JWT_V1 — ?b=booking (student) or ?s=slot (teacher)
  }
  function getBookingId(){ return new URLSearchParams(location.search).get('b'); }
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmtDate(s){ if(!s) return ''; const [y,m,d]=s.split('-'); return new Date(+y,+m-1,+d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }

  let jitsiApi = null;

  function leaveRoom(){
    if (jitsiApi) try { jitsiApi.dispose(); } catch(_){}
    window.location.href = '/my-live-classes.html';
  }
  window.leaveRoom = leaveRoom;

  function isJitsiLink(url){ try { return new URL(url).hostname === 'meet.tfrplay.com'; } catch(_){ return false; } }
  function jitsiRoomFromUrl(url){ try { return new URL(url).pathname.replace(/^\//,'') || ''; } catch(_){ return ''; } }

  async function recordJoin(bookingId){
    try {
      const token = localStorage.getItem('archive_token');
      await fetch('/api/lc/me/joined/' + bookingId, { method:'POST', headers:{ Authorization:'Bearer ' + token } });
    } catch(_){}
  }

  function showPermissionDeniedPopup(errName){
    // PERMISSION_DENIED_MODAL_V1 — full-screen modal with browser-specific directions
    const ua = navigator.userAgent;
    const isChrome = /Chrome|Edg|Brave/i.test(ua) && !/Firefox/i.test(ua);
    const isFirefox = /Firefox/i.test(ua);
    const isSafari = /Safari/i.test(ua) && !/Chrome/i.test(ua);
    let steps = '';
    if (isChrome) {
      steps = '<li>Click the <b>🔒 lock icon</b> (or camera icon) on the left of the address bar</li><li>Find <b>Camera</b> and <b>Microphone</b> in the dropdown</li><li>Change both from <b>Block</b> to <b>Allow</b></li><li>Click <b>Try Again</b> below (no need to refresh)</li>';
    } else if (isFirefox) {
      steps = '<li>Click the <b>🔒 padlock icon</b> in the address bar</li><li>Click <b>Connection secure</b> → <b>More information</b> → <b>Permissions</b></li><li>Uncheck <b>Use Default</b> next to Camera and Microphone, then click <b>Allow</b></li><li>Click <b>Try Again</b> below</li>';
    } else if (isSafari) {
      steps = '<li>Open <b>Safari → Settings → Websites</b></li><li>Click <b>Camera</b> in left sidebar → set tfrplay.com to <b>Allow</b></li><li>Click <b>Microphone</b> → set tfrplay.com to <b>Allow</b></li><li>Refresh this page</li>';
    } else {
      steps = '<li>Open your browser site settings for tfrplay.com</li><li>Set Camera and Microphone to <b>Allow</b></li><li>Refresh this page</li>';
    }
    const html = '<div id="perm-modal" style="position:fixed;inset:0;background:rgba(8,7,6,.92);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;">' +
      '<div style="background:#1a1614;border:1px solid #C8A84B;border-radius:14px;max-width:520px;width:100%;padding:32px;color:#F0E6D3;font-family:DM Sans,sans-serif;box-shadow:0 20px 60px rgba(0,0,0,.5);">' +
        '<div style="font-size:48px;text-align:center;margin-bottom:8px;">🎥🎙️</div>' +
        '<h2 style="color:#C8A84B;text-align:center;margin:0 0 6px;font-family:Libre Baskerville,serif;font-size:22px;">Camera &amp; Mic Blocked</h2>' +
        '<p style="text-align:center;opacity:.85;margin:0 0 18px;font-size:14px;">To attend the live class, we need access to your camera and microphone. Right now they are blocked by your browser.</p>' +
        '<div style="background:rgba(200,168,75,.08);border:1px solid rgba(200,168,75,.3);border-radius:10px;padding:16px 16px 16px 36px;margin-bottom:20px;">' +
          '<div style="font-weight:700;color:#C8A84B;margin-bottom:8px;margin-left:-20px;">How to fix (' + (isChrome?'Chrome/Edge':isFirefox?'Firefox':isSafari?'Safari':'Browser') + '):</div>' +
          '<ol style="margin:0;padding-left:18px;line-height:1.7;font-size:14px;">' + steps + '</ol>' +
        '</div>' +
        '<div style="display:flex;gap:10px;">' +
          '<button id="perm-retry" style="flex:1;background:#C8A84B;color:#080706;border:0;border-radius:8px;padding:12px;font-weight:700;cursor:pointer;font-size:15px;">🔄 Try Again</button>' +
          '<button id="perm-refresh" style="flex:1;background:transparent;color:#F0E6D3;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:12px;cursor:pointer;font-size:15px;">Refresh Page</button>' +
        '</div>' +
        '<p style="text-align:center;margin:14px 0 0;font-size:12px;opacity:.6;">Error: ' + (errName||'NotAllowedError') + '</p>' +
      '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
    document.getElementById('perm-retry').onclick = async () => {
      document.getElementById('perm-modal').remove();
      const container = document.getElementById('room');
      const ok = await requestAVPermission(container);
      if (ok && window._pendingJitsiInit) window._pendingJitsiInit();
    };
    document.getElementById('perm-refresh').onclick = () => location.reload();
  }

  async function requestAVPermission(container){
    // MEDIA_PERMISSION_V1 — ask camera+mic up-front so user sees clear browser prompt
    container.innerHTML = '<div class="external-meet"><h2>🎥 Camera &amp; Microphone</h2><p>This live class needs access to your camera and microphone.</p><p style="opacity:.7;font-size:14px;">Click <b>Allow</b> on the browser prompt to continue.</p><div id="perm-status" style="margin-top:14px;font-size:14px;color:#C8A84B;">Requesting permission…</div></div>';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true, video:true });
      stream.getTracks().forEach(t => t.stop()); // release immediately, Jitsi will re-request
      return true;
    } catch(e) {
      showPermissionDeniedPopup(e && e.name);
      return false;
    }
  }

  async function renderJitsi(meetUrl, b){
    const room = jitsiRoomFromUrl(meetUrl);
    const userStr = localStorage.getItem('archive_user');
    let displayName = b.name || 'Student';
    try { const u = JSON.parse(userStr||'null'); if (u && u.first_name) displayName = u.first_name + ' ' + (u.last_name||''); } catch(_){}

    const container = document.getElementById('room');
    container.innerHTML = '<div id="jitsi-container"></div>';
    if (!window.JitsiMeetExternalAPI) {
      container.innerHTML = '<div class="error">Jitsi API failed to load. Please refresh.</div>';
      return;
    }
    jitsiApi = new JitsiMeetExternalAPI('meet.tfrplay.com', {
      roomName: room,
      jwt: b.jitsi_jwt,                       // JITSI_JWT_V1 — only server-issued tokens allowed
      parentNode: document.getElementById('jitsi-container'),
      width: '100%', height: '100%',
      userInfo: { displayName, email: b.email || '' },
      configOverwrite: {
        prejoinPageEnabled: true,                 // PREJOIN_V2 — Jitsi handles cam/mic permission cleanly
        startWithAudioMuted: true,
        startWithVideoMuted: false,
        enableLobby: true,
        enableInsecureRoomNameWarning: false,
        disableProfile: true,
        defaultLogoUrl: '/assets/tfr-play/tfr-logo-main.png',
        defaultLocalDisplayName: displayName,
        hideConferenceSubject: true,
        hideConferenceTimer: false,
        toolbarConfig: { autoHideWhileChatIsOpen: true },
        disableInviteFunctions: true,
        doNotStoreRoom: true,
        readOnlyName: true,
        prejoinConfig: { enabled: true }
      },
      interfaceConfigOverwrite: {
        // TFR_BRANDING_V1 — strip all Jitsi branding
        SHOW_JITSI_WATERMARK: false,
        SHOW_WATERMARK_FOR_GUESTS: false,
        SHOW_BRAND_WATERMARK: false,
        SHOW_POWERED_BY: false,
        JITSI_WATERMARK_LINK: '',
        BRAND_WATERMARK_LINK: '',
        DEFAULT_LOGO_URL: '/assets/tfr-play/tfr-logo-main.png',
        DEFAULT_WELCOME_PAGE_LOGO_URL: '/assets/tfr-play/tfr-logo-main.png',
        DEFAULT_BACKGROUND: '#080706',
        DEFAULT_REMOTE_DISPLAY_NAME: 'TFR Student',
        DEFAULT_LOCAL_DISPLAY_NAME: displayName,
        APP_NAME: 'TFR Live Class',
        NATIVE_APP_NAME: 'TFR Live Class',
        PROVIDER_NAME: 'The Foundation Room',
        MOBILE_APP_PROMO: false,
        HIDE_INVITE_MORE_HEADER: true,
        DISABLE_JOIN_LEAVE_NOTIFICATIONS: false,
        DISABLE_VIDEO_BACKGROUND: false,
        SHOW_PROMOTIONAL_CLOSE_PAGE: false,
        SHOW_CHROME_EXTENSION_BANNER: false,
        DISABLE_RINGING: true,
        DISABLE_TRANSCRIPTION_SUBTITLES: false,
        TOOLBAR_BUTTONS: [
          'microphone','camera','closedcaptions','desktop','fullscreen',
          'hangup','chat','participants-pane','raisehand','tileview',
          'select-background','toggle-camera','help','settings'
        ]
      }
    });
    jitsiApi.addEventListener('videoConferenceJoined', () => {
      recordJoin(b.booking_id);
      // SECURE_ROOM_V1 — first joiner (becomes moderator) auto-enables lobby + sets password
      // so subsequent joiners are gated even if URL leaks.
      try {
        // Generate a session password from the booking + slot so it's reproducible per-class
        const pwd = 'tfr-' + (b.slot_id || '') + '-' + (Math.floor(Date.now()/3600000));
        jitsiApi.executeCommand('password', pwd);                         // lock room
        jitsiApi.executeCommand('toggleLobby', true);                     // open lobby (gate later joiners)
      } catch (_) {}
    });
    // Auto-input password when joining if Jitsi prompts (for late joiners)
    jitsiApi.addEventListener('passwordRequired', () => {
      try {
        const pwd = 'tfr-' + (b.slot_id || '') + '-' + (Math.floor(Date.now()/3600000));
        jitsiApi.executeCommand('password', pwd);
      } catch (_) {}
    });
    jitsiApi.addEventListener('readyToClose', () => leaveRoom());
  }

  function renderExternal(meetUrl, b){
    document.getElementById('room').innerHTML = `
      <div class="external-meet">
        <h2>External Meeting Room</h2>
        <p>Your class with <b style="color:var(--gold);">${esc(b.teacher_name)}</b> is hosted on an external platform (Google Meet or similar). Click below to join in a new tab.</p>
        <p style="color:var(--text-3);font-size:12px;">${esc(b.slot_date)} · ${esc(b.start_time)} IST · ${b.duration_min||60} min</p>
        <a href="${esc(meetUrl)}" target="_blank" rel="noopener" class="open-btn" onclick="recordJoin(${b.booking_id})">Open meeting in new tab →</a>
      </div>`;
  }

  // TIME_GATE_V1 — only allow join 10 min before start until 30 min after class end
  function classWindow(slotDate, startTime, durationMin){
    const [y,m,d] = slotDate.split('-').map(Number);
    const [hh,mm] = startTime.split(':').map(Number);
    const start = new Date(y, m-1, d, hh, mm);
    const open  = new Date(start.getTime() - 10 * 60 * 1000);
    const close = new Date(start.getTime() + (Number(durationMin||60) + 30) * 60 * 1000);
    return { start, open, close };
  }
  function fmtCountdown(ms){
    if (ms <= 0) return '0s';
    const s = Math.floor(ms/1000);
    const days = Math.floor(s/86400), hrs = Math.floor((s%86400)/3600), mins = Math.floor((s%3600)/60), secs = s%60;
    if (days > 0) return days + 'd ' + hrs + 'h';
    if (hrs > 0)  return hrs + 'h ' + mins + 'm';
    if (mins > 0) return mins + 'm ' + secs + 's';
    return secs + 's';
  }

  function renderLocked(b){
    const { start, open, close } = classWindow(b.slot_date, b.start_time, b.duration_min);
    const now = new Date();
    if (now >= close) {
      document.getElementById('room').innerHTML = `
        <div class="external-meet">
          <h2>Class ended</h2>
          <p>This live session ended on ${esc(fmtDate(b.slot_date))} at ${esc(b.start_time)} IST. Your assigned materials (if any) are in your dashboard.</p>
          <a href="/my-live-class-materials.html" class="open-btn" style="margin-top:14px;">View My Materials →</a>
        </div>`;
      return;
    }
    // Locked — class hasn't opened yet
    document.getElementById('room').innerHTML = `
      <div class="external-meet">
        <h2>🔒 Class Locked</h2>
        <p>Your live session with <b style="color:var(--gold);">${esc(b.teacher_name)}</b> is on <b>${esc(fmtDate(b.slot_date))}</b> at <b>${esc(b.start_time)} IST</b>.</p>
        <p style="margin-top:18px;">The Join button unlocks <strong>10 minutes before</strong> the scheduled start. Please come back then.</p>
        <div style="margin-top:24px;padding:18px 28px;background:rgba(200,168,75,0.06);border:1px solid rgba(200,168,75,0.18);border-radius:8px;display:inline-block;">
          <div style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px;">Opens in</div>
          <div id="countdown" style="font-family:'Libre Baskerville',serif;font-size:32px;color:var(--gold);">${fmtCountdown(open - now)}</div>
        </div>
        <p style="margin-top:18px;"><a href="/my-live-classes.html" class="btn">← Back to My Live Classes</a></p>
      </div>`;
    // Tick down + auto-reload when window opens
    const tick = () => {
      const ms = open - new Date();
      const el = document.getElementById('countdown');
      if (!el) return;
      if (ms <= 0) { location.reload(); return; }
      el.textContent = fmtCountdown(ms);
    };
    setInterval(tick, 1000);
  }

  async function init(){
    const { bookingId, slotId } = getJoinParams();
    if (!bookingId && !slotId) { document.getElementById('room').innerHTML = '<div class="error">Missing booking or slot id.</div>'; return; }
    // STRICT_JWT_V1 — student goes via /me/class-room, teacher via /teacher/class-room
    const endpoint = slotId
      ? '/api/lc/teacher/class-room/' + slotId
      : '/api/lc/me/class-room/' + bookingId;
    try {
      const token = localStorage.getItem('archive_token');
      const r = await fetch(endpoint, { headers:{ Authorization:'Bearer ' + token } });
      if (r.status === 401) { window.location.replace('/signin.html'); return; }
      if (r.status === 410) {
        // STRICT_TIME_GATE_V1 — class ended, backend refused to serve meet link
        document.getElementById('room').innerHTML = `
          <div class="external-meet">
            <h2>🔒 Class Ended</h2>
            <p>This live session has ended. The meeting room is closed.</p>
            <a href="/my-live-class-materials.html" class="open-btn" style="margin-top:14px;">View My Materials →</a>
          </div>`;
        return;
      }
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Failed');
      const b = data.booking;
      document.getElementById('info').innerHTML = '<b>' + esc(b.teacher_name || 'Teacher') + '</b> · ' + esc(b.instrument || 'live') + ' · ' + fmtDate(b.slot_date) + ' ' + esc(b.start_time) + ' IST';
      if (!b.meet_link) { document.getElementById('room').innerHTML = '<div class="error">No meeting link configured yet. Please ask the admin.</div>'; return; }

      // TIME_GATE_V1 — only enter the room when the class window is open
      const { open, close } = classWindow(b.slot_date, b.start_time, b.duration_min);
      const now = new Date();
      if (now < open || now >= close) { renderLocked(b); return; }

      if (isJitsiLink(b.meet_link)) {
        if (typeof window.JitsiMeetExternalAPI !== 'undefined') renderJitsi(b.meet_link, b);
        else {
          const wait = setInterval(() => { if (window.JitsiMeetExternalAPI){ clearInterval(wait); renderJitsi(b.meet_link, b); } }, 200);
        }
      } else {
        renderExternal(b.meet_link, b);
      }
    } catch (e){
      document.getElementById('room').innerHTML = '<div class="error">' + esc(e.message) + '</div>';
    }
  }

  window.recordJoin = recordJoin;
  init();
</script>
</body>
</html>
