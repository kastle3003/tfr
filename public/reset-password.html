<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — The Foundation Room</title>
  <link rel="icon" type="image/png" href="/assets/tfr-play/tfr-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #080706;
      --bg-2:        #0F0D0B;
      --bg-card:     #161412;
      --bg-elevated: #1E1B17;
      --gold:        #C8A84B;
      --gold-bright: #E8C96E;
      --gold-dim:    #7A6530;
      --gold-glow:   rgba(200,168,75,0.15);
      --text:        #F0E6D3;
      --text-2:      #B8A898;
      --text-3:      #6B5E50;
      --ruby:        #bf0000;
      --emerald:     #2D5A27;
      --serif:       'Libre Baskerville', Baskerville, 'Baskerville Old Face', Georgia, serif;
      --sans:        'DM Sans', 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: var(--sans);
      background-color: var(--bg);
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid rgba(200,168,75,0.1);
      padding: 40px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .logo-wrap {
      margin-bottom: 28px;
    }
    .logo-wrap img { height: 36px; width: auto; display: block; }

    .eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      font-family: var(--serif);
      font-style: italic;
      font-size: 30px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 7px;
    }

    .pw-wrap { position: relative; }
    .form-input {
      width: 100%;
      padding: 11px 44px 11px 14px;
      background: var(--bg-elevated);
      border: 1.5px solid rgba(200,168,75,0.15);
      border-radius: 3px;
      font-size: 14px;
      font-family: var(--sans);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: var(--text-3); }
    .form-input:focus {
      border-color: rgba(200,168,75,0.6);
      box-shadow: 0 0 0 3px rgba(200,168,75,0.08);
    }

    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-3);
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: var(--gold); }
    .pw-toggle svg { display: block; width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    .strength-bar { height: 3px; border-radius: 2px; background: rgba(200,168,75,0.1); margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; width: 0; border-radius: 2px; transition: width 0.3s, background 0.3s; }
    .strength-label { font-size: 11px; color: var(--text-3); margin-top: 4px; min-height: 16px; }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--gold);
      color: #080706;
      border: none;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--sans);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .btn:hover { background: var(--gold-bright); }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .error-msg {
      background: rgba(191,0,0,0.12);
      border: 1px solid rgba(191,0,0,0.3);
      color: #E8856E;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 16px;
      display: none;
    }

    .success-state {
      text-align: center;
      padding: 20px 0;
      display: none;
    }
    .success-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(45,90,39,0.15);
      border: 2px solid rgba(45,90,39,0.4);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .success-icon svg { width: 28px; height: 28px; stroke: #7BC47A; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .success-state h2 { font-family: var(--serif); font-style: italic; font-size: 26px; color: var(--text); margin-bottom: 8px; }
    .success-state p { font-size: 13px; color: var(--text-2); line-height: 1.5; }

    .expired-state {
      text-align: center;
      padding: 20px 0;
      display: none;
    }
    .expired-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(191,0,0,0.12);
      border: 2px solid rgba(191,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .expired-icon svg { width: 28px; height: 28px; stroke: #E8856E; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .expired-state h2 { font-family: var(--serif); font-style: italic; font-size: 26px; color: var(--text); margin-bottom: 8px; }
    .expired-state p { font-size: 13px; color: var(--text-2); line-height: 1.5; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-3);
    }
    .back-link a { color: var(--gold); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(8,7,6,0.4);
      border-top-color: #080706;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 500px) {
      .card { padding: 28px 20px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <a href="/"><img src="/assets/tfr-play/tfr-logo.png" alt="The Foundation Room"></a>
  </div>

  <!-- FORM STATE -->
  <div id="form-state">
    <p class="eyebrow">Account Security</p>
    <h1>Set New Password</h1>
    <p class="sub">Choose a strong password for your account.</p>

    <div class="error-msg" id="err-msg"></div>

    <form id="reset-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="pw-new">New Password</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="pw-new" placeholder="Min. 8 characters" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('pw-new', this)" aria-label="Toggle visibility">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="pw-confirm">Confirm Password</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="pw-confirm" placeholder="Re-enter your password" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('pw-confirm', this)" aria-label="Toggle visibility">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn" type="submit" id="btn-submit">Update Password</button>
    </form>

    <p class="back-link"><a href="/signin.html">← Back to sign in</a></p>
  </div>

  <!-- SUCCESS STATE -->
  <div class="success-state" id="success-state">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2>Password Updated</h2>
    <p>Your new password is set. Redirecting you to sign in…</p>
  </div>

  <!-- EXPIRED / INVALID STATE -->
  <div class="expired-state" id="expired-state">
    <div class="expired-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <h2>Link Expired</h2>
    <p id="expired-msg">This reset link is invalid or has expired. Please request a new one.</p>
    <p class="back-link" style="margin-top:20px;"><a href="/signin.html#panel-forgot">Request a new link →</a></p>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token') || '';

  if (!token) {
    document.getElementById('form-state').style.display = 'none';
    document.getElementById('expired-state').style.display = 'block';
    document.getElementById('expired-msg').textContent = 'No reset token found. Please use the link from your email.';
  }

  function togglePw(id, btn) {
    const input = document.getElementById(id);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.querySelector('svg').innerHTML = isText
      ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  }

  document.getElementById('pw-new').addEventListener('input', function () {
    const v = this.value;
    const fill  = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    let score = 0;
    if (v.length >= 8)                        score++;
    if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
    if (/[0-9]/.test(v))                      score++;
    if (/[^A-Za-z0-9]/.test(v))               score++;
    const map = [
      { w: '0%',   bg: 'transparent', txt: '' },
      { w: '33%',  bg: '#bf0000',     txt: 'Weak' },
      { w: '66%',  bg: '#C8881A',     txt: 'Fair' },
      { w: '100%', bg: '#2D5A27',     txt: 'Strong' },
    ];
    const level = v.length > 0 ? Math.max(1, Math.min(score, 3)) : 0;
    fill.style.width      = map[level].w;
    fill.style.background = map[level].bg;
    label.textContent     = map[level].txt;
    label.style.color     = map[level].bg !== 'transparent' ? map[level].bg : 'var(--text-3)';
  });

  function showError(msg) {
    const el = document.getElementById('err-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError() { document.getElementById('err-msg').style.display = 'none'; }

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();
    const pw      = document.getElementById('pw-new').value;
    const confirm = document.getElementById('pw-confirm').value;

    if (pw.length < 8) return showError('Password must be at least 8 characters.');
    if (pw !== confirm) return showError('Passwords do not match.');

    const btn = document.getElementById('btn-submit');
    btn._text = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;

    try {
      const res  = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reset_token: token, password: pw })
      });
      const data = await res.json();

      if (!res.ok) {
        if (res.status === 400 && (data.error || '').toLowerCase().includes('expir')) {
          document.getElementById('form-state').style.display = 'none';
          document.getElementById('expired-state').style.display = 'block';
          document.getElementById('expired-msg').textContent = data.error;
          return;
        }
        throw new Error(data.error || 'Something went wrong. Please try again.');
      }

      document.getElementById('form-state').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';

      const roleHome = { admin: '/admin-panel.html', instructor: '/instructor-dashboard.html' };
      const dest = roleHome[data.role] || '/signin.html';
      setTimeout(() => { window.location.href = dest; }, 2000);

    } catch (err) {
      showError(err.message);
      btn.innerHTML = btn._text;
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
