<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Lessons — The Foundation Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/archive.css">
  <style>
    :root {
      --bg: #080706;
      --bg-2: #0F0D0B;
      --bg-card: #161412;
      --bg-elevated: #1E1B17;
      --gold: #C8A84B;
      --gold-bright: #E8C96E;
      --gold-dim: #7A6530;
      --text: #F0E6D3;
      --text-2: #B8A898;
      --text-3: #6B5E50;
      --serif: 'Libre Baskerville', Baskerville, 'Baskerville Old Face', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--sans); }

    .card {
      background: var(--bg-card);
      border: 1px solid rgba(200,168,75,0.1);
      transition: border-color 0.2s;
    }
    .card:hover { border-color: rgba(200,168,75,0.3); }

    /* Lesson rows inside accordions */
    .lesson-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      border-top: 1px solid rgba(200,168,75,0.06);
      transition: background 0.15s;
    }
    .lesson-row:hover { background: var(--bg-elevated); }

    .lesson-check {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(200,168,75,0.3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .lesson-check.done {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
    }
    .lesson-check:not(.done):hover {
      border-color: var(--gold);
    }

    .lesson-type-icon {
      width: 24px; height: 24px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }
    .type-video { background: rgba(200,168,75,0.12); }
    .type-reading { background: rgba(200,168,75,0.08); }
    .type-exercise { background: rgba(232,201,110,0.1); }

    /* Chapter header row */
    .chapter-header {
      padding: 10px 20px;
      background: var(--bg-elevated);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      border-top: 1px solid rgba(200,168,75,0.1);
    }

    /* Badge overrides */
    .badge-crimson { background: rgba(200,168,75,0.15); color: var(--gold); border: 1px solid rgba(200,168,75,0.2); }
    .badge-green { background: rgba(200,168,75,0.08); color: var(--gold-dim); border: 1px solid rgba(200,168,75,0.12); }
    .badge-gold { background: rgba(232,201,110,0.12); color: var(--gold-bright); border: 1px solid rgba(232,201,110,0.2); }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-title">My Lessons</div>
      <div class="topbar-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search lessons…">
      </div>
      <div class="topbar-actions">
        <a href="/" class="icon-btn" title="View public website" style="font-size:15px; line-height:1;">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </a>
        <a href="/student-notifications.html" class="icon-btn" title="Notifications"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="badge-dot"></span></a>
        <a href="/student-profile.html" class="topbar-avatar" id="topbar-avatar" title="Profile">?</a>
      </div>
    </header>

    <main class="main-content">
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:16px; text-align:center; padding:40px;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(200,168,75,0.4)" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <h2 style="font-family:'Libre Baskerville', Baskerville, 'Baskerville Old Face', Georgia,serif; font-size:28px; color:#F0E6D3; font-weight:600;">Lessons are inside your courses</h2>
        <p style="font-size:14px; color:#b8ad9e; max-width:340px;">Head to My Courses to pick up where you left off. Videos complete automatically when you finish watching.</p>
        <a href="/student-courses.html" style="margin-top:8px; padding:12px 28px; background:#C8A84B; color:#080706; font-size:13px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; border-radius:4px; text-decoration:none;">Go to My Courses</a>
      </div>
    </main>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth-guard.js"></script>
<script>requireRole(['student']);</script>
<script src="/assets/js/student-sidebar.js"></script>
<script>
  function toast(msg, type = 'success') {
    const tc = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type === 'error' ? 'error' : ''}`;
    t.textContent = msg;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function handleLogout() {
    localStorage.removeItem('archive_token');
    localStorage.removeItem('archive_user');
    window.location.href = '/signin.html';
  }

  document.addEventListener('userLoaded', (e) => {
    const user = e.detail;
    document.getElementById('topbar-avatar').textContent = user.avatar_initials || '?';
    loadLessons();
  });

  async function loadLessons() {
    const container = document.getElementById('lessons-container');
    try {
      const data = await api.get('/api/enrollments/me');
      const enrollments = data.enrollments || [];
      if (!enrollments.length) {
        container.innerHTML = `<div class="card"><div class="empty-state"><div class="empty-icon">📖</div><h3>No courses yet</h3><p>Enroll in a course from the Library to see your lessons here.</p><a href="/student-course-catalog.html" class="btn btn-primary" style="display:inline-flex; margin-top:14px;">Browse Library</a></div></div>`;
        return;
      }
      const html = enrollments.map((e, idx) => `
        <div class="card content-card" style="padding:0; margin-bottom:14px; overflow:hidden;">
          <div style="background:${e.cover_color || 'rgba(200,168,75,0.15)'}; padding:16px 20px; display:flex; align-items:center; gap:14px; cursor:pointer; border-bottom:1px solid rgba(200,168,75,0.1);" onclick="toggleCourse(${e.course_id}, this)">
            <div style="flex:1;">
              <div style="font-family:'Libre Baskerville', Baskerville, 'Baskerville Old Face', Georgia,serif; font-style:italic; font-size:16px; font-weight:600; color:#fff;">${e.course_title}</div>
              <div style="font-size:11px; color:rgba(255,255,255,0.65); margin-top:2px;">${e.instructor_name || ''} · ${e.level || ''}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:20px; font-weight:700; color:var(--gold-bright);">${e.progress_pct || 0}%</div>
              <div class="progress-bar" style="width:80px; background:rgba(255,255,255,0.15); margin-top:4px;">
                <div class="progress-fill" style="background:var(--gold); width:${e.progress_pct || 0}%;"></div>
              </div>
            </div>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" class="accordion-chevron"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div id="course-chapters-${e.course_id}" style="display:none;">
            <div id="chapters-loading-${e.course_id}" style="padding:20px; text-align:center;"><div class="spinner" style="margin:auto;"></div></div>
          </div>
        </div>
      `).join('');
      container.innerHTML = html;
    } catch (err) {
      container.innerHTML = `<div class="card"><p style="padding:20px; font-size:13px; color:var(--text-3);">${err.message}</p></div>`;
    }
  }

  const loadedCourses = new Set();

  async function toggleCourse(courseId, header) {
    const body = document.getElementById(`course-chapters-${courseId}`);
    const chevron = header.querySelector('.accordion-chevron');
    if (body.style.display === 'block') {
      body.style.display = 'none';
      chevron.style.transform = '';
      return;
    }
    body.style.display = 'block';
    chevron.style.transform = 'rotate(180deg)';

    if (loadedCourses.has(courseId)) return;
    loadedCourses.add(courseId);

    try {
      const data = await api.get(`/api/courses/${courseId}/chapters`);
      const chapters = data.chapters || [];
      document.getElementById(`chapters-loading-${courseId}`).remove();
      if (!chapters.length) {
        body.innerHTML = '<div style="padding:16px 20px; font-size:13px; color:var(--text-3);">No lessons available yet.</div>';
        return;
      }

      // Chapter is complete when every non-preview lesson is completed.
      const isChapterComplete = (ch) => {
        const gated = (ch.lessons || []).filter(l => !l.is_preview);
        if (!gated.length) return false;
        return gated.every(l => l.completed);
      };

      // Sequential unlock: first chapter always open; later chapters locked until
      // the previous chapter is 100% complete. Applies even to bundle owners.
      const unlockedFlags = chapters.map((ch, i) => i === 0 || isChapterComplete(chapters[i - 1]));

      body.innerHTML = chapters.map((ch, i) => {
        const unlocked = unlockedFlags[i];
        const prev = chapters[i - 1];
        const lockBanner = unlocked ? '' : `
          <div style="padding:10px 16px; background:rgba(200,168,75,0.05); border-left:3px solid var(--gold-dim); font-size:12px; color:var(--text-3);">
            🔒 Finish <strong style="color:var(--text-2);">${prev ? prev.title : 'the previous chapter'}</strong> to unlock these lessons.
          </div>`;

        return `
        <div style="${unlocked ? '' : 'opacity:.55;'}">
          <div class="chapter-header">
            ${ch.order_index}. ${ch.title}
          </div>
          ${lockBanner}
          ${(ch.lessons || []).map(l => `
            <div class="lesson-row section-block" style="${unlocked ? 'cursor:pointer;' : 'pointer-events:none;'}" ${unlocked ? `onclick="openLessonPlayer(${l.id}, ${courseId})"` : ''}>
              <div class="lesson-check ${l.completed ? 'done' : ''}" id="check-${l.id}" ${unlocked ? `onclick="event.stopPropagation(); toggleLesson(${l.id}, ${courseId}, this)"` : ''}>
                ${l.completed ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
              </div>
              <div class="lesson-type-icon type-${l.type}">
                ${l.type === 'video' ? '▶' : l.type === 'reading' ? '📄' : l.type === 'exercise' ? '🎵' : '❓'}
              </div>
              <div style="flex:1; min-width:0;">
                <div style="font-size:13px; font-weight:${l.completed ? '400' : '600'}; color:${l.completed ? 'var(--text-3)' : 'var(--text)'}; ${l.completed ? 'text-decoration:line-through;' : ''}">${l.title}</div>
                <div style="font-size:11px; color:var(--text-3); margin-top:1px;">${l.duration_minutes ? l.duration_minutes + ' min' : ''}</div>
              </div>
              ${unlocked
                ? `<span style="flex-shrink:0; font-size:11px; padding:3px 10px; border-radius:4px; background:rgba(200,168,75,0.12); color:var(--gold); font-weight:600; letter-spacing:.04em;">▶ Play</span>`
                : `<span class="badge ${l.type === 'video' ? 'badge-crimson' : l.type === 'reading' ? 'badge-green' : 'badge-gold'}" style="font-size:11px;">${l.type}</span>`}
            </div>
            <div id="lv-${l.id}" style="display:none; background:var(--bg-2); border-top:1px solid rgba(200,168,75,0.08);"></div>
          `).join('')}
        </div>`;
      }).join('');
    } catch (err) {
      document.getElementById(`chapters-loading-${courseId}`).innerHTML = `<p style="font-size:13px; color:var(--gold); padding:16px 20px;">${err.message}</p>`;
    }
  }

  /* ── Inline lesson video player ── */
  const _lpCache = {};

  async function openLessonPlayer(lessonId, courseId) {
    const panel = document.getElementById('lv-' + lessonId);
    if (!panel) return;
    if (panel.style.display === 'block') {
      panel.querySelectorAll('video,iframe').forEach(el => { const s = el.src; el.src = ''; el.src = s; });
      panel.style.display = 'none';
      return;
    }
    panel.style.display = 'block';
    if (_lpCache[lessonId]) { renderLessonPlayer(lessonId); return; }
    panel.innerHTML = '<div style="padding:20px; text-align:center; font-size:13px; color:var(--text-3);">Loading…</div>';
    try {
      const data = await api.get('/api/lessons/' + lessonId);
      _lpCache[lessonId] = { ...data.lesson, _courseId: courseId };
      renderLessonPlayer(lessonId);
    } catch (e) {
      const isLocked = e.message && (e.message.includes('Access denied') || e.message.includes('not_purchased'));
      if (isLocked) {
        panel.innerHTML = `
          <div style="padding:32px 20px; text-align:center; background:rgba(200,168,75,0.03); border-top:1px solid rgba(200,168,75,0.08);">
            <div style="width:48px;height:48px;background:rgba(200,168,75,0.08);border:1px solid rgba(200,168,75,0.2);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(200,168,75,0.7)" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </div>
            <h4 style="font-family:'Libre Baskerville',serif;font-size:16px;color:#fff;margin-bottom:8px;font-weight:400;">Purchase to unlock</h4>
            <p style="font-size:13px;color:var(--text-2);margin-bottom:20px;line-height:1.6;">Kindly purchase to view the complete course.</p>
            <a href="/student-courses.html" style="display:inline-block;padding:10px 28px;background:linear-gradient(180deg,#E8C96E,#C8A84B);border-radius:3px;color:#080706;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;">View Course Options</a>
          </div>`;
      } else {
        panel.innerHTML = '<div style="padding:16px; font-size:12px; color:var(--text-3); text-align:center;">Could not load lesson content.</div>';
      }
    }
  }

  function renderLessonPlayer(lessonId) {
    const panel = document.getElementById('lv-' + lessonId);
    const lesson = _lpCache[lessonId];
    const mats = (lesson && lesson.materials) || [];
    if (!mats.length) {
      panel.innerHTML = '<div style="padding:20px; font-size:13px; color:var(--text-3); text-align:center; font-style:italic;">No content added to this lesson yet.</div>';
      return;
    }
    panel.innerHTML = mats.map(m => {
      if (m.type === 'video') {
        const isYT = m.url && /youtube\.com|youtu\.be/i.test(m.url);
        let player;
        if (isYT) {
          const ytId = extractYtId(m.url);
          player = `<iframe src="https://www.youtube.com/embed/${ytId}" style="position:absolute;inset:0;width:100%;height:100%;border:none;" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
        } else if (m.secure_stream) {
          player = `<video id="vid-${m.id}" controls preload="metadata" style="position:absolute;inset:0;width:100%;height:100%;background:#000;"></video>`;
        } else if (m.url) {
          player = `<video id="vid-${m.id}" src="${m.url}" controls preload="metadata" style="position:absolute;inset:0;width:100%;height:100%;background:#000;"></video>`;
        } else {
          player = `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:13px;">Video unavailable</div>`;
        }
        const ts = m.timestamps || [];
        const tsBar = ts.length ? `
          <div style="padding:10px 16px; background:#0a0806; border-top:1px solid rgba(200,168,75,0.08);">
            <div style="font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-3); margin-bottom:6px;">Chapters</div>
            <div style="display:flex; flex-wrap:wrap; gap:6px;">
              ${ts.map(t => {
                const m2 = Math.floor(t.time_seconds/60), s2 = String(t.time_seconds%60).padStart(2,'0');
                return `<span style="font-size:11px; padding:3px 10px; border-radius:12px; background:var(--bg-card); border:1px solid rgba(200,168,75,0.12); color:var(--text-2); cursor:pointer;" onclick="seekPlayer('${m.id}',${t.time_seconds},${isYT?1:0})"><span style="font-family:monospace; color:var(--gold-dim); font-size:10px;">${m2}:${s2}</span> ${t.label||''}</span>`;
              }).join('')}
            </div>
          </div>` : '';
        return `<div>
          <div style="position:relative; aspect-ratio:16/9; background:#000;" id="vwrap-${m.id}">${player}</div>
          ${tsBar}
        </div>`;
      }
      if (m.type === 'pdf' && m.url) return `<iframe src="${m.url}" style="width:100%; height:520px; border:none;"></iframe>`;
      if (m.type === 'url' && m.url) return `<div style="padding:16px;"><a href="${m.url}" target="_blank" rel="noopener" style="color:var(--gold); font-size:13px;">Open resource →</a></div>`;
      return '';
    }).join('');

    // For Wasabi-hosted videos, fetch a short-lived stream token and set the video src
    mats.forEach(m => {
      if (m.type !== 'video' || !m.secure_stream) return;
      const vid = panel.querySelector('#vid-' + m.id);
      if (!vid) return;
      api.get('/api/video/' + m.id + '/token').then(data => {
        if (data.stream_url) vid.src = data.stream_url;
      }).catch(() => {});
    });

    // After video ends on a free-preview lesson, show purchase gate overlay
    if (lesson.is_first_free || lesson.is_preview) {
      mats.forEach(m => {
        if (m.type !== 'video' || /youtube\.com|youtu\.be/i.test(m.url || '')) return;
        const vid = panel.querySelector('#vid-' + m.id);
        const wrap = panel.querySelector('#vwrap-' + m.id);
        if (!vid || !wrap) return;
        vid.addEventListener('ended', () => {
          if (wrap.querySelector('.purchase-gate')) return;
          const gate = document.createElement('div');
          gate.className = 'purchase-gate';
          gate.style.cssText = 'position:absolute;inset:0;background:rgba(8,7,6,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:32px;text-align:center;';
          gate.innerHTML = `
            <div style="width:56px;height:56px;background:rgba(200,168,75,0.1);border:1px solid rgba(200,168,75,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:22px;">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(200,168,75,0.85)" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </div>
            <h3 style="font-family:'Libre Baskerville',serif;font-size:20px;font-weight:400;color:#fff;margin-bottom:10px;">Continue Learning</h3>
            <p style="font-size:14px;color:#B8A898;max-width:300px;line-height:1.65;margin-bottom:28px;">Kindly purchase to view the complete course.</p>
            <a href="/student-courses.html" style="display:inline-block;padding:12px 36px;background:linear-gradient(180deg,#E8C96E,#C8A84B);border-radius:3px;color:#080706;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;">View Course Options</a>
          `;
          wrap.appendChild(gate);
        });
      });
    }
  }

  function extractYtId(url) {
    const m1 = url.match(/youtu\.be\/([\w-]+)/);
    if (m1) return m1[1];
    const m2 = url.match(/[?&]v=([\w-]+)/);
    if (m2) return m2[1];
    const m3 = url.match(/youtube\.com\/embed\/([\w-]+)/);
    if (m3) return m3[1];
    return '';
  }

  function seekPlayer(matId, seconds, isYT) {
    const wrap = document.getElementById('vwrap-' + matId);
    if (!wrap) return;
    if (isYT) {
      const iframe = wrap.querySelector('iframe');
      if (iframe) { const u = new URL(iframe.src); u.searchParams.set('start', seconds); u.searchParams.set('autoplay','1'); iframe.src = u.toString(); }
    } else {
      const vid = wrap.querySelector('video');
      if (vid) { vid.currentTime = seconds; vid.play(); }
    }
  }

  async function toggleLesson(lessonId, courseId, el) {
    if (el.classList.contains('done')) return;
    try {
      const data = await api.post(`/api/lessons/${lessonId}/complete`, {});
      el.classList.add('done');
      el.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
      const lessonRow = el.closest('.lesson-row');
      if (lessonRow) {
        const titleEl = lessonRow.querySelector('div[style*="font-weight"]');
        if (titleEl) {
          titleEl.style.textDecoration = 'line-through';
          titleEl.style.color = 'var(--text-3)';
          titleEl.style.fontWeight = '400';
        }
      }
      toast(`Lesson marked complete! Progress: ${data.progress_pct || 0}%`);
      loadedCourses.delete(courseId);
    } catch (err) {
      toast(err.message, 'error');
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
  gsap.registerPlugin(ScrollTrigger);
  gsap.from('.page-header, .stat-card, .content-card', {
    y: 24, opacity: 0, duration: 0.65, stagger: 0.07, ease: 'power3.out', delay: 0.1
  });
  gsap.utils.toArray('.section-block, .card-row, tr').forEach(el => {
    gsap.from(el, { scrollTrigger: { trigger: el, start: 'top 88%' },
      y: 16, opacity: 0, duration: 0.5, ease: 'power2.out' });
  });
</script>
</body>
</html>
