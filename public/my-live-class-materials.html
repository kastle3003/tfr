<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/assets/tfr-play/favicon-tfr.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>My Live Class Materials — The Foundation Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080706; --bg-2:#0F0D0B; --bg-card:#161412; --bg-elevated:#1E1B17;
    --gold:#C8A84B; --gold-bright:#E8C96E; --gold-dim:#7A6530;
    --text:#F0E6D3; --text-2:#B8A898; --text-3:#6B5E50;
    --ruby:#C8362A; --emerald:#3E8E5A;
    --serif:'Libre Baskerville',Georgia,serif; --sans:'DM Sans',system-ui,sans-serif;
  }
  *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }
  a{ color:inherit; text-decoration:none; }
  .topbar{ background:var(--bg-2); border-bottom:1px solid rgba(200,168,75,.16); padding:18px 32px; display:flex; align-items:center; justify-content:space-between; }
  .topbar img{ height:30px; }
  .topbar .eyebrow{ font-size:11px; letter-spacing:.24em; color:var(--gold); text-transform:uppercase; }
  .btn{ padding:8px 14px; background:transparent; border:1px solid rgba(200,168,75,.32); color:var(--text); border-radius:6px; cursor:pointer; font-size:13px; font-family:var(--sans); font-weight:600; }
  .btn:hover{ border-color:var(--gold); }
  .container{ max-width:1100px; margin:0 auto; padding:40px 32px 60px; }
  .page-title{ font-family:var(--serif); font-size:32px; margin-bottom:6px; }
  .page-sub{ color:var(--text-3); font-size:14px; margin-bottom:36px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:18px; }
  .card{ background:var(--bg-card); border:1px solid rgba(200,168,75,.10); border-radius:10px; padding:22px; transition:.2s; }
  .card:hover{ border-color:rgba(200,168,75,.32); transform:translateY(-2px); }
  .card-type{ display:inline-block; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); background:rgba(200,168,75,.08); padding:3px 10px; border-radius:10px; }
  .card-title{ font-family:var(--serif); font-size:18px; color:var(--text); margin-top:12px; margin-bottom:8px; line-height:1.4; }
  .card-meta{ font-size:12px; color:var(--text-3); margin-bottom:14px; }
  .card-action{ display:inline-block; padding:8px 16px; background:var(--gold); color:#080706; border-radius:5px; font-size:12px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; }
  .card-action:hover{ background:var(--gold-bright); }
  .card-text-body{ background:var(--bg-elevated); padding:14px; border-radius:6px; font-size:13px; color:var(--text-2); line-height:1.6; white-space:pre-wrap; max-height:180px; overflow-y:auto; }
  .empty{ text-align:center; padding:80px 20px; color:var(--text-3); }
  .empty h2{ font-family:var(--serif); color:var(--gold); font-weight:400; margin-bottom:14px; }
  .empty p{ font-size:14px; line-height:1.7; max-width:480px; margin:0 auto; }
  .error{ color:var(--ruby); padding:20px; text-align:center; }
</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="/"><img src="/assets/tfr-play/tfr-logo-main.png" alt="TFR"></a>
    <div>
      <div class="eyebrow">My Materials</div>
      <div style="font-family:var(--serif);font-size:16px;">Live Class Content</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;">
    <a href="/student-dashboard.html" class="btn">← Dashboard</a>
    <button class="btn" onclick="logout()" style="border-color:rgba(200,54,42,.4);color:var(--ruby);">Logout</button>
  </div>
</div>

<div class="container">
  <div class="page-title">Your Live Class Materials</div>
  <div class="page-sub">Content assigned by your teachers after each live session — PDFs, videos, links and notes.</div>

  <div id="content"><div class="empty"><p>Loading…</p></div></div>
</div>

<script>
  (function(){
    const t = localStorage.getItem('archive_token');
    if (!t) { window.location.replace('/signin.html'); return; }
  })();

  function logout(){
    localStorage.removeItem('archive_token');
    localStorage.removeItem('archive_user');
    window.location.href = '/signin.html';
  }
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmtDate(s){ if(!s) return ''; const [y,m,d]=s.split('-'); return new Date(+y,+m-1,+d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }
  function fmtDateTime(s){ if(!s) return ''; try { return new Date(s).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); } catch(_){ return s; } }

  function typeIcon(t){
    const map = { pdf:'📄', video:'▶', link:'🔗', text:'📝' };
    return map[t] || '•';
  }

  async function load(){
    try {
      const token = localStorage.getItem('archive_token');
      const r = await fetch('/api/lc/me/assignments', { headers:{ Authorization:'Bearer ' + token } });
      if (r.status === 401){ logout(); return; }
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Failed');
      const list = data.assignments || [];
      if (!list.length){
        document.getElementById('content').innerHTML = `
          <div class="empty">
            <h2>No materials yet</h2>
            <p>After your live class, your teacher will assign personalised content (PDFs, videos, links, or notes) tailored to your progress. It'll appear here.</p>
          </div>`;
        return;
      }
      document.getElementById('content').innerHTML = '<div class="grid">' + list.map(a => `
        <div class="card">
          <span class="card-type">${typeIcon(a.type)} ${esc(a.type)}</span>
          <div class="card-title">${esc(a.title)}</div>
          <div class="card-meta">
            By ${esc(a.teacher_name||'Teacher')}${a.instrument ? ' · ' + esc(a.instrument) : ''}<br>
            Session: ${fmtDate(a.slot_date)} · ${esc(a.start_time||'')} IST<br>
            Assigned: ${fmtDateTime(a.created_at)}
          </div>
          ${a.type === 'text'
            ? `<div class="card-text-body">${esc(a.body_text||'')}</div>`
            : (a.file_url ? `<a href="${esc(a.file_url)}" target="_blank" rel="noopener" class="card-action">Open ${esc(a.type)} →</a>` : '')}
        </div>`).join('') + '</div>';
    } catch (e){
      document.getElementById('content').innerHTML = '<div class="error">' + esc(e.message) + '</div>';
    }
  }
  load();
</script>
</body>
</html>
