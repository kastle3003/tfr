<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Courses — The Foundation Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/archive.css">
  <style>
    :root {
      --bg: #080706;
      --bg-2: #0F0D0B;
      --bg-card: #161412;
      --bg-elevated: #1E1B17;
      --gold: #C8A84B;
      --gold-bright: #E8C96E;
      --gold-dim: #7A6530;
      --text: #F0E6D3;
      --text-2: #B8A898;
      --text-3: #6B5E50;
      --serif: 'Cormorant Garamond', serif;
      --sans: 'DM Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-tabs { display: flex; gap: 6px; }
    .filter-tab {
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-2);
      background: transparent;
      border: 1px solid rgba(200,168,75,0.14);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-tab:hover { color: var(--text); border-color: rgba(200,168,75,0.3); }
    .filter-tab.active {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold);
    }
    .filter-count {
      font-size: 11px;
      opacity: 0.7;
      margin-left: 4px;
    }
    .filter-search {
      flex: 1;
      min-width: 200px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--bg-card);
      border: 1px solid rgba(200,168,75,0.1);
      border-radius: 8px;
    }
    .filter-search input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
    }
    .filter-search input::placeholder { color: var(--text-3); }

    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    .course-card {
      background: var(--bg-card);
      border: 1px solid rgba(200,168,75,0.1);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.18s;
      display: flex;
      flex-direction: column;
    }
    .course-card:hover {
      border-color: rgba(200,168,75,0.32);
      transform: translateY(-2px);
    }

    .course-cover {
      height: 110px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }
    .course-cover::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.5));
      pointer-events: none;
    }
    .course-cover-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }
    .course-level {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.35);
      padding: 4px 10px;
      border-radius: 999px;
      color: #fff;
      backdrop-filter: blur(4px);
    }
    .course-instrument {
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      font-weight: 500;
      background: rgba(0,0,0,0.25);
      padding: 4px 10px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }
    .course-status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot-active { background: var(--gold-bright); box-shadow: 0 0 8px var(--gold); }
    .dot-complete { background: #6fbf73; box-shadow: 0 0 6px rgba(111,191,115,0.5); }

    .course-body {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }
    .course-title {
      font-family: var(--serif);
      font-style: italic;
      font-size: 19px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.25;
    }
    .course-meta {
      font-size: 12px;
      color: var(--text-3);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .course-meta-dot { color: rgba(200,168,75,0.3); }

    .course-progress-wrap {
      margin-top: 4px;
    }
    .course-progress-head {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-2);
      margin-bottom: 6px;
    }
    .course-progress-pct { color: var(--gold-bright); font-weight: 700; }
    .course-progress-bar {
      height: 4px;
      background: rgba(200,168,75,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .course-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright));
      border-radius: 2px;
      transition: width 0.3s;
    }

    .course-actions {
      padding: 12px 18px 16px;
      border-top: 1px solid rgba(200,168,75,0.06);
      display: flex;
      gap: 8px;
    }
    .course-btn {
      flex: 1;
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-align: center;
      transition: all 0.15s;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .course-btn-primary {
      background: var(--gold);
      color: var(--bg);
    }
    .course-btn-primary:hover { background: var(--gold-bright); }
    .course-btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid rgba(200,168,75,0.14);
    }
    .course-btn-ghost:hover {
      color: #ff6b6b;
      border-color: rgba(255,107,107,0.3);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-2);
    }
    .empty-state h3 {
      font-family: var(--serif);
      font-style: italic;
      font-size: 24px;
      color: var(--text);
      margin: 14px 0 6px;
    }
    .empty-state p { font-size: 13px; margin-bottom: 18px; color: var(--text-3); }
    .empty-icon { font-size: 42px; opacity: 0.6; }

    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }
    .skeleton-card {
      height: 280px;
      background: linear-gradient(90deg, var(--bg-card) 0%, var(--bg-elevated) 50%, var(--bg-card) 100%);
      background-size: 200% 100%;
      border-radius: 12px;
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .page-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid rgba(200,168,75,0.08);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .stat-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 600;
      color: var(--gold-bright);
      line-height: 1;
    }
    .stat-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-title">My Courses</div>
      <div class="topbar-actions">
        <a href="/student-course-catalog.html" class="btn btn-primary" style="display:inline-flex; gap:6px; align-items:center; padding:8px 14px; font-size:12px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Browse Catalog
        </a>
        <a href="/student-profile.html" class="topbar-avatar" id="topbar-avatar" title="Profile">?</a>
      </div>
    </header>

    <main class="main-content">
      <div class="page-header">
        <div class="page-title">My Courses</div>
        <p class="page-subtitle">Courses you're enrolled in. Pick up where you left off.</p>
      </div>

      <div class="page-stats" id="stats">
        <div class="stat-card"><div class="stat-label">Enrolled</div><div class="stat-value" id="stat-total">—</div><div class="stat-sub">total courses</div></div>
        <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value" id="stat-active">—</div><div class="stat-sub">currently learning</div></div>
        <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" id="stat-complete">—</div><div class="stat-sub">courses finished</div></div>
        <div class="stat-card"><div class="stat-label">Avg Progress</div><div class="stat-value" id="stat-avg">—</div><div class="stat-sub">across all courses</div></div>
      </div>

      <div class="filter-bar">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">All <span class="filter-count" id="count-all">0</span></button>
          <button class="filter-tab" data-filter="active">Active <span class="filter-count" id="count-active">0</span></button>
          <button class="filter-tab" data-filter="completed">Completed <span class="filter-count" id="count-completed">0</span></button>
        </div>
        <div class="filter-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--text-3);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search" placeholder="Search by course or instructor…">
        </div>
      </div>

      <div id="courses-container">
        <div class="skeleton-grid">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth-guard.js"></script>
<script>requireRole(['student']);</script>
<script src="/assets/js/student-sidebar.js"></script>
<script>
  function toast(msg, type = 'success') {
    const tc = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type === 'error' ? 'error' : ''}`;
    t.textContent = msg;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  let allEnrollments = [];
  let currentFilter = 'all';
  let currentSearch = '';

  document.addEventListener('userLoaded', (e) => {
    const user = e.detail;
    document.getElementById('topbar-avatar').textContent = user.avatar_initials || '?';
    loadCourses();
  });

  async function loadCourses() {
    try {
      const data = await api.get('/api/enrollments/me');
      allEnrollments = data.enrollments || [];
      updateStats();
      render();
    } catch (err) {
      document.getElementById('courses-container').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <h3>Couldn't load courses</h3>
          <p>${err.message}</p>
        </div>`;
    }
  }

  function updateStats() {
    const total = allEnrollments.length;
    const completed = allEnrollments.filter(e => (e.progress_pct || 0) >= 100).length;
    const active = total - completed;
    const avg = total ? Math.round(allEnrollments.reduce((s, e) => s + (e.progress_pct || 0), 0) / total) : 0;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-complete').textContent = completed;
    document.getElementById('stat-avg').textContent = avg + '%';

    document.getElementById('count-all').textContent = total;
    document.getElementById('count-active').textContent = active;
    document.getElementById('count-completed').textContent = completed;
  }

  function filterList() {
    return allEnrollments.filter(e => {
      const pct = e.progress_pct || 0;
      if (currentFilter === 'active' && pct >= 100) return false;
      if (currentFilter === 'completed' && pct < 100) return false;
      if (currentSearch) {
        const hay = `${e.course_title || ''} ${e.instructor_name || ''} ${e.instrument || ''} ${e.level || ''}`.toLowerCase();
        if (!hay.includes(currentSearch)) return false;
      }
      return true;
    });
  }

  function formatLastAccessed(iso) {
    if (!iso) return 'Not started';
    const d = new Date(iso.replace(' ', 'T') + 'Z');
    if (isNaN(d)) return 'Not started';
    const diffMs = Date.now() - d.getTime();
    const diffDays = Math.floor(diffMs / 86400000);
    if (diffDays === 0) return 'Today';
    if (diffDays === 1) return 'Yesterday';
    if (diffDays < 7) return `${diffDays}d ago`;
    if (diffDays < 30) return `${Math.floor(diffDays / 7)}w ago`;
    if (diffDays < 365) return `${Math.floor(diffDays / 30)}mo ago`;
    return `${Math.floor(diffDays / 365)}y ago`;
  }

  function render() {
    const list = filterList();
    const container = document.getElementById('courses-container');

    if (!allEnrollments.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🎓</div>
          <h3>No courses yet</h3>
          <p>Enroll in a course from the catalog to begin your learning journey.</p>
          <a href="/student-course-catalog.html" class="btn btn-primary" style="display:inline-flex; padding:10px 20px;">Browse Catalog</a>
        </div>`;
      return;
    }

    if (!list.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <h3>No matches</h3>
          <p>Try adjusting your filters or search query.</p>
        </div>`;
      return;
    }

    container.innerHTML = `<div class="course-grid">${list.map(cardHTML).join('')}</div>`;
  }

  function cardHTML(e) {
    const pct = e.progress_pct || 0;
    const isComplete = pct >= 100;
    const cover = e.cover_color || '#2a2420';
    const accent = e.cover_accent || 'rgba(200,168,75,0.22)';

    return `
      <div class="course-card">
        <div class="course-cover" style="background: linear-gradient(135deg, ${cover} 0%, ${accent} 100%);">
          <div class="course-cover-top">
            <span class="course-level">${escapeHTML(e.level || 'Foundation')}</span>
            ${e.instrument ? `<span class="course-instrument">${escapeHTML(e.instrument)}</span>` : ''}
          </div>
          <div style="position:relative; z-index:1;">
            <span style="font-size:11px; color:#fff; font-weight:500;">
              <span class="course-status-dot ${isComplete ? 'dot-complete' : 'dot-active'}"></span>
              ${isComplete ? 'Completed' : 'In Progress'}
            </span>
          </div>
        </div>

        <div class="course-body">
          <div class="course-title">${escapeHTML(e.course_title || 'Untitled Course')}</div>
          <div class="course-meta">
            <span>${escapeHTML(e.instructor_name || 'Unknown Instructor')}</span>
            ${e.lesson_count ? `<span class="course-meta-dot">•</span><span>${e.lesson_count} lessons</span>` : ''}
            <span class="course-meta-dot">•</span><span>Accessed ${formatLastAccessed(e.last_accessed_at)}</span>
          </div>

          <div class="course-progress-wrap">
            <div class="course-progress-head">
              <span>Progress</span>
              <span class="course-progress-pct">${pct}%</span>
            </div>
            <div class="course-progress-bar">
              <div class="course-progress-fill" style="width:${pct}%;"></div>
            </div>
          </div>
        </div>

        <div class="course-actions">
          <a href="/student-course-detail.html?id=${e.course_id}" class="course-btn course-btn-primary">
            ${isComplete ? 'Review' : pct > 0 ? 'Continue' : 'Start'}
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </a>
          <button class="course-btn course-btn-ghost" onclick="unenroll(${e.course_id}, '${escapeJS(e.course_title)}')" title="Unenroll">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>
    `;
  }

  async function unenroll(courseId, title) {
    if (!confirm(`Unenroll from "${title}"? Your progress will be lost.`)) return;
    try {
      await api.del(`/api/enrollments/${courseId}`);
      allEnrollments = allEnrollments.filter(e => e.course_id !== courseId);
      updateStats();
      render();
      toast('Unenrolled successfully');
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  function escapeHTML(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function escapeJS(s) {
    return String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  document.getElementById('search').addEventListener('input', (e) => {
    currentSearch = e.target.value.trim().toLowerCase();
    render();
  });
</script>
</body>
</html>
