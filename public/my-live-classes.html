<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/assets/tfr-play/favicon-tfr.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>My Live Classes — The Foundation Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080706; --bg-2:#0F0D0B; --bg-card:#161412; --bg-elevated:#1E1B17;
    --gold:#C8A84B; --gold-bright:#E8C96E; --gold-dim:#7A6530;
    --text:#F0E6D3; --text-2:#B8A898; --text-3:#6B5E50;
    --ruby:#C8362A; --emerald:#3E8E5A;
    --serif:'Libre Baskerville',Georgia,serif; --sans:'DM Sans',system-ui,sans-serif;
  }
  *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }
  a{ color:inherit; text-decoration:none; }
  .topbar{ background:var(--bg-2); border-bottom:1px solid rgba(200,168,75,.16); padding:18px 32px; display:flex; align-items:center; justify-content:space-between; }
  .topbar img{ height:30px; }
  .topbar .eyebrow{ font-size:11px; letter-spacing:.24em; color:var(--gold); text-transform:uppercase; }
  .btn{ padding:8px 14px; background:transparent; border:1px solid rgba(200,168,75,.32); color:var(--text); border-radius:6px; cursor:pointer; font-size:13px; font-family:var(--sans); font-weight:600; text-decoration:none; display:inline-block; }
  .btn:hover{ border-color:var(--gold); }
  .container{ max-width:1100px; margin:0 auto; padding:40px 32px 60px; }
  .page-title{ font-family:var(--serif); font-size:32px; margin-bottom:6px; }
  .page-sub{ color:var(--text-3); font-size:14px; margin-bottom:36px; }
  .class-card{ background:var(--bg-card); border:1px solid rgba(200,168,75,.10); border-radius:10px; padding:24px; margin-bottom:14px; display:grid; grid-template-columns:60px 1fr auto; gap:20px; align-items:center; transition:.2s; }
  .class-card:hover{ border-color:rgba(200,168,75,.22); }
  .class-card .avatar{ width:60px; height:60px; border-radius:50%; background:var(--bg-elevated); background-size:cover; background-position:center; border:1px solid rgba(200,168,75,.18); }
  .class-card .info h3{ font-family:var(--serif); font-size:18px; margin-bottom:4px; }
  .class-card .info .meta{ font-size:13px; color:var(--text-2); line-height:1.6; }
  .class-card .meta-time{ color:var(--gold); }
  .class-card .meta-instrument{ display:inline-block; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--gold-dim); background:rgba(200,168,75,.08); padding:2px 8px; border-radius:8px; margin-right:8px; }
  .join-btn{ padding:12px 22px; border-radius:6px; font-size:13px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; border:none; font-family:var(--sans); transition:.15s; }
  .join-btn.live{ background:var(--gold); color:#080706; }
  .join-btn.live:hover{ background:var(--gold-bright); }
  .join-btn.disabled{ background:rgba(200,168,75,.08); color:var(--text-3); cursor:not-allowed; }
  .countdown{ font-size:11px; color:var(--text-3); text-align:right; margin-top:4px; }
  .empty{ text-align:center; padding:80px 20px; color:var(--text-3); }
  .empty h2{ font-family:var(--serif); color:var(--gold); font-weight:400; margin-bottom:14px; }
  .empty p{ font-size:14px; line-height:1.7; max-width:480px; margin:0 auto; }
  .empty a{ color:var(--gold); }
  .error{ color:var(--ruby); padding:20px; text-align:center; }
  @media (max-width: 700px){
    .class-card{ grid-template-columns:50px 1fr; }
    .class-card .join-cell{ grid-column:1/-1; text-align:center; margin-top:8px; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="/"><img src="/assets/tfr-play/tfr-logo-main.png" alt="TFR"></a>
    <div>
      <div class="eyebrow">My Sessions</div>
      <div style="font-family:var(--serif);font-size:16px;">Upcoming Live Classes</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;">
    <a href="/student-dashboard.html" class="btn">← Dashboard</a>
    <button class="btn" onclick="logout()" style="border-color:rgba(200,54,42,.4);color:var(--ruby);">Logout</button>
  </div>
</div>

<div class="container">
  <div class="page-title">Your Live Classes</div>
  <div class="page-sub">Your booked sessions appear here. Browse all available teachers + slots below.</div>

  <!-- BOOKED CLASSES -->
  <h2 style="font-family:var(--serif);font-size:22px;color:var(--gold);margin:30px 0 16px;">My Upcoming Classes</h2>
  <div id="list"><div class="empty" style="padding:40px 20px;"><p>Loading…</p></div></div>

  <!-- BROWSE ALL TEACHERS & SLOTS -->
  <h2 style="font-family:var(--serif);font-size:22px;color:var(--gold);margin:60px 0 16px;">Browse Available Live Classes</h2>
  <div style="color:var(--text-3);font-size:13px;margin-bottom:18px;">All teachers + their upcoming slots across Sitar / Kathak / Vocals.</div>
  <div id="browse"><div class="empty" style="padding:40px 20px;"><p>Loading available slots…</p></div></div>
</div>

<script>
  (function(){
    const t = localStorage.getItem('archive_token');
    if (!t) { window.location.replace('/signin.html'); return; }
  })();
  function logout(){ localStorage.clear(); window.location.href = '/signin.html'; }
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmtDate(s){ if(!s) return ''; const [y,m,d]=s.split('-'); return new Date(+y,+m-1,+d).toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'}); }

  // Class is "live joinable" from 10 min before start until 30 min after end
  function classWindow(slotDate, startTime, durationMin){
    const [y,m,d] = slotDate.split('-').map(Number);
    const [hh,mm] = startTime.split(':').map(Number);
    const start = new Date(y, m-1, d, hh, mm);
    const open = new Date(start.getTime() - 10 * 60 * 1000);
    const close = new Date(start.getTime() + (Number(durationMin||60) + 30) * 60 * 1000);
    return { start, open, close };
  }
  function statusFor(c, now){
    const { start, open, close } = classWindow(c.slot_date, c.start_time, c.duration_min);
    if (now < open) {
      const mins = Math.round((open - now) / 60000);
      if (mins > 60 * 24) return { label: 'Opens ' + fmtDate(c.slot_date), live: false };
      if (mins > 60) return { label: 'Opens in ' + Math.floor(mins/60) + 'h ' + (mins%60) + 'm', live: false };
      return { label: 'Opens in ' + mins + ' min', live: false };
    }
    if (now < close) return { label: 'Join now', live: true };
    return { label: 'Class ended', live: false };
  }

  async function loadMyClasses(){
    try {
      const token = localStorage.getItem('archive_token');
      const r = await fetch('/api/lc/me/upcoming-classes', { headers:{ Authorization:'Bearer ' + token } });
      if (r.status === 401){ logout(); return; }
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Failed');
      const list = data.classes || [];
      if (!list.length){
        document.getElementById('list').innerHTML = `
          <div class="empty" style="padding:40px 20px;">
            <p>You haven't booked any live classes yet. Browse below ↓ and pick one to book.</p>
          </div>`;
        return;
      }
      const now = new Date();
      document.getElementById('list').innerHTML = list.map(c => {
        const photo = c.teacher_photo || '';
        const st = statusFor(c, now);
        const btn = st.live
          ? `<a href="/live-class-room.html?b=${c.booking_id}" class="join-btn live">${esc(st.label)} →</a>`
          : `<button class="join-btn disabled" disabled>${esc(st.label)}</button>`;
        return `
          <div class="class-card">
            <div class="avatar" style="${photo ? 'background-image:url(' + esc(photo) + ')' : ''}"></div>
            <div class="info">
              <h3>${esc(c.teacher_name || 'Teacher')}</h3>
              <div class="meta">
                <span class="meta-instrument">${esc(c.instrument||'live')}</span>
                <span class="meta-time">${fmtDate(c.slot_date)} · ${esc(c.start_time)} IST</span>
                <span style="color:var(--text-3);"> · ${c.duration_min||60} min</span>
              </div>
            </div>
            <div class="join-cell">${btn}</div>
          </div>`;
      }).join('');
    } catch (e){
      document.getElementById('list').innerHTML = '<div class="error">' + esc(e.message) + '</div>';
    }
  }

  /* BROWSE_ALL_LIVE_CLASSES_V1 — list every teacher + their upcoming slots so student can book from this page */
  async function loadBrowse(){
    try {
      const r = await fetch('/api/lc/teachers');
      const data = await r.json();
      const teachers = data.teachers || [];
      if (!teachers.length){
        document.getElementById('browse').innerHTML = '<div class="empty" style="padding:40px 20px;"><p>No teachers available yet.</p></div>';
        return;
      }
      // For each teacher, fetch upcoming slots in parallel
      const teacherCards = await Promise.all(teachers.map(async t => {
        let slots = [];
        try {
          const tr = await fetch('/api/lc/teachers/' + encodeURIComponent(t.slug));
          const td = await tr.json();
          slots = (td.slots || []).filter(s => s.is_active !== 0);
        } catch (_) {}
        return { teacher: t, slots };
      }));

      const sectionHtml = teacherCards.map(({ teacher: t, slots }) => {
        const L = t.landing || {};
        const photo = L.hero_photo_full || t.photo_url || '';
        return `
          <div style="background:var(--bg-card);border:1px solid rgba(200,168,75,0.10);border-radius:10px;padding:22px;margin-bottom:18px;">
            <div style="display:flex;gap:18px;align-items:center;margin-bottom:14px;">
              <div style="width:56px;height:56px;border-radius:50%;background:var(--bg-elevated);background-image:${photo?`url('${esc(photo)}')`:'none'};background-size:cover;background-position:center;flex-shrink:0;border:1px solid rgba(200,168,75,0.18);"></div>
              <div style="flex:1;">
                <a href="/live-classes/${encodeURIComponent(t.slug)}" style="font-family:var(--serif);font-size:19px;color:var(--text);text-decoration:none;">${esc(t.name)}</a>
                <div style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-dim);margin-top:2px;">${esc(t.instrument||'')}</div>
              </div>
              <a href="/live-classes/${encodeURIComponent(t.slug)}" style="padding:8px 14px;background:transparent;border:1px solid rgba(200,168,75,.32);color:var(--gold);border-radius:5px;text-decoration:none;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;">View Page →</a>
            </div>
            ${slots.length ? `
              <div style="display:grid;grid-template-columns:1fr;gap:8px;">
                ${slots.slice(0, 4).map(s => {
                  const soldOut = s.seats_left <= 0;
                  return `
                    <div style="background:var(--bg-elevated);padding:12px 14px;border-radius:6px;display:flex;justify-content:space-between;align-items:center;gap:14px;">
                      <div style="font-size:13px;color:var(--text);">
                        <b>${fmtDate(s.slot_date)}</b> · ${esc(s.start_time)} IST · ${s.duration_min||60} min
                        <span style="margin-left:8px;font-size:11px;color:${soldOut?'var(--ruby)':'var(--gold)'};">${soldOut ? 'Sold out' : (s.seats_left + ' seats')}</span>
                      </div>
                      ${soldOut
                        ? '<span style="font-size:11px;color:var(--text-3);">—</span>'
                        : `<a href="/live-classes/book/${s.id}" style="padding:7px 14px;background:var(--gold);color:#080706;border-radius:4px;text-decoration:none;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;">Book →</a>`}
                    </div>`;
                }).join('')}
                ${slots.length > 4 ? `<a href="/live-classes/${encodeURIComponent(t.slug)}#pick-slot" style="font-size:12px;color:var(--gold);text-decoration:none;text-align:center;padding:8px;">+ ${slots.length-4} more slots — view all →</a>` : ''}
              </div>
            ` : '<div style="font-size:13px;color:var(--text-3);font-style:italic;padding:14px;text-align:center;background:var(--bg-elevated);border-radius:6px;">No upcoming slots yet.</div>'}
          </div>`;
      }).join('');
      document.getElementById('browse').innerHTML = sectionHtml;
    } catch (e){
      document.getElementById('browse').innerHTML = '<div class="error">' + esc(e.message) + '</div>';
    }
  }

  function loadAll(){ loadMyClasses(); loadBrowse(); }
  loadAll();
  // Re-check every 30s so "Opens in X min" updates and button enables at the right moment
  setInterval(loadMyClasses, 30000);
</script>
</body>
</html>
