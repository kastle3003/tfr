<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Classes — The Foundation Room</title>
  <link rel="icon" type="image/png" href="/assets/tfr-play/favicon-tfr.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/site-chrome.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #080706; color: #fff;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    em, i { font-style: normal; }

    .hero {
      position: relative; width: 100%; height: 100vh; min-height: 600px;
      background: #120e09; overflow: hidden; display: flex; align-items: center;
    }
    .hero-artist {
      position: absolute; top: 0; left: 0; bottom: 0; width: 54%;
      background-size: auto 98%; background-repeat: no-repeat;
      background-position: left center;
    }
    .hero-artist::after {
      content: ''; position: absolute; inset: 0;
      background:
        linear-gradient(to right,
          rgba(8,7,6,0.05) 0%, rgba(8,7,6,0.05) 30%,
          rgba(8,7,6,0.45) 55%, rgba(8,7,6,0.78) 72%,
          rgba(18,14,9,0.96) 90%),
        linear-gradient(to bottom,
          rgba(8,7,6,0.60) 0%, transparent 14%, transparent 68%,
          rgba(8,7,6,0.82) 84%, #0d0a07 100%);
    }
    .hero::after {
      content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 48%;
      background: linear-gradient(to right, transparent 0%, #120e09 28%); z-index: 0;
    }
    .hero::before {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 72px;
      background: linear-gradient(to bottom, transparent, #0d0a07); z-index: 1;
    }
    .hero-content {
      position: relative; z-index: 2; width: 100%;
      max-width: 1360px; margin: 0 auto; padding: 0 80px;
      display: flex; justify-content: flex-end; align-items: center;
    }
    .hero-text { width: 570px; text-align: center; padding-top: 64px; }
    .hero-eyebrow {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(22px, 2.2vw, 30px); font-weight: 300;
      letter-spacing: 0.18em; color: #C8A84B; text-transform: uppercase;
      margin-bottom: 2px; line-height: 1.3;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(66px, 7.5vw, 104px); font-weight: 700;
      color: var(--accent-color, #C8362A); line-height: 0.90;
      letter-spacing: 0.02em; text-transform: uppercase; margin-bottom: 30px;
    }
    .hero-subtitle {
      font-size: clamp(14px, 1.3vw, 17px); font-weight: 300;
      color: rgba(255,255,255,0.82); line-height: 1.65;
      margin-bottom: 14px; letter-spacing: 0.01em;
    }
    .hero-badge {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 15px; font-weight: 300;
      color: rgba(255,255,255,0.44);
      letter-spacing: 0.06em; margin-bottom: 46px;
    }
    .hero-cta {
      display: inline-flex; align-items: center; gap: 14px;
      background: #C8A84B; color: #080706;
      font-size: clamp(13px, 1.1vw, 15px); font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 18px 46px; border-radius: 4px;
      cursor: pointer; border: none;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .hero-cta:hover {
      background: #E8C96E; transform: translateY(-2px);
      box-shadow: 0 14px 36px rgba(200,168,75,0.32);
    }

    .trust-strip {
      background: #0d0a07; border-top: 1px solid rgba(200,168,75,0.12);
      padding: 28px 0;
    }
    .trust-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 48px;
      display: flex; justify-content: center; gap: 64px; flex-wrap: wrap;
    }
    .trust-item { display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center; }
    .trust-num {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px; font-weight: 600; color: #C8A84B; line-height: 1;
    }
    .trust-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.45);
    }

    .about-section { background: #080706; padding: 100px 0 80px; }
    .about-inner { max-width: 900px; margin: 0 auto; padding: 0 48px; text-align: center; }
    .section-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: #C8A84B; margin-bottom: 18px;
    }
    .section-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(36px, 4vw, 56px); font-weight: 600;
      color: #F0E6D3; line-height: 1.1; margin-bottom: 24px;
    }
    .section-body {
      font-size: 16px; font-weight: 300; color: rgba(255,255,255,0.65);
      line-height: 1.8; max-width: 720px; margin: 0 auto 48px;
    }

    .learn-section {
      background: #0F0D0B; padding: 80px 0;
      border-top: 1px solid rgba(200,168,75,0.08);
      border-bottom: 1px solid rgba(200,168,75,0.08);
    }
    .learn-inner { max-width: 1100px; margin: 0 auto; padding: 0 48px; }
    .learn-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 24px; margin-top: 48px;
    }
    .learn-card {
      background: rgba(200,168,75,0.04);
      border: 1px solid rgba(200,168,75,0.14);
      border-radius: 10px; padding: 28px 24px;
    }
    .learn-card-icon { font-size: 28px; margin-bottom: 14px; }
    .learn-card-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 20px; font-weight: 600; color: #F0E6D3; margin-bottom: 8px;
    }
    .learn-card-body {
      font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.7;
    }

    .cta-section { background: #080706; padding: 90px 0; text-align: center; }
    .cta-inner { max-width: 700px; margin: 0 auto; padding: 0 48px; }
    .cta-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(32px, 4vw, 52px); font-weight: 600;
      color: #F0E6D3; line-height: 1.15; margin-bottom: 16px;
    }
    .cta-sub {
      font-size: 15px; color: rgba(255,255,255,0.55);
      line-height: 1.6; margin-bottom: 40px;
    }

    @media (max-width: 1100px) {
      .hero-title { font-size: clamp(56px, 7vw, 90px); }
      .hero-text { width: 480px; }
      .hero-content { padding: 0 48px; }
    }
    @media (max-width: 860px) {
      .hero-artist { width: 100%; background-size: auto 92%; opacity: 0.25; }
      .hero::after { display: none; }
      .hero-content { justify-content: center; padding: 0 28px; }
      .hero-text { width: 100%; max-width: 520px; }
      .trust-inner { gap: 36px; }
      .learn-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .hero-title { font-size: clamp(48px, 12vw, 72px); }
      .hero-eyebrow { font-size: clamp(18px, 5vw, 24px); }
      .hero-cta { padding: 15px 30px; }
      .hero-content { padding: 0 18px; }
      .learn-grid { grid-template-columns: 1fr; }
      .about-inner, .learn-inner, .cta-inner { padding: 0 24px; }
    }
  </style>
</head>
<body>

<div data-site-nav data-active="live-classes"></div>
<script src="/assets/js/site-chrome.js"></script>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-artist" id="hero-artist"></div>
  <div class="hero-content">
    <div class="hero-text" id="hero-text">
      <p style="color:rgba(255,255,255,0.5);font-size:14px;">Loading…</p>
    </div>
  </div>
</section>

<!-- TRUST STRIP -->
<div class="trust-strip" id="trust-strip" style="display:none;">
  <div class="trust-inner" id="trust-inner"></div>
</div>

<!-- ABOUT -->
<section class="about-section" id="about-section" style="display:none;">
  <div class="about-inner">
    <p class="section-eyebrow" id="about-eyebrow">About the Programme</p>
    <h2 class="section-title" id="about-title"></h2>
    <p class="section-body" id="about-body"></p>
    <a href="#" id="about-cta" class="hero-cta">See Available Slots →</a>
  </div>
</section>

<!-- WHAT YOU WILL LEARN -->
<section class="learn-section" id="learn-section" style="display:none;">
  <div class="learn-inner">
    <p class="section-eyebrow" style="text-align:center;">What You Will Learn</p>
    <h2 class="section-title" style="text-align:center;" id="learn-title"></h2>
    <div class="learn-grid" id="learn-grid"></div>
  </div>
</section>

<!-- CTA BOTTOM -->
<section class="cta-section" id="cta-section" style="display:none;">
  <div class="cta-inner">
    <h2 class="cta-title" id="cta-title"></h2>
    <p class="cta-sub" id="cta-sub"></p>
    <a href="#" id="cta-btn" class="hero-cta">Book Your Slot →</a>
  </div>
</section>

<script src="/assets/js/live-classes-public.js"></script>
<script>
  const path = window.location.pathname;
  const m = path.match(/^\/live-classes\/([^\/]+)\/?$/);
  const teacherSlug = m ? decodeURIComponent(m[1]) : '';

  function setHTML(id, html) { const el = document.getElementById(id); if (el) el.innerHTML = html; }
  function setText(id, txt) { const el = document.getElementById(id); if (el) el.textContent = txt; }
  function show(id) { const el = document.getElementById(id); if (el) el.style.display = ''; }

  async function load() {
    if (!teacherSlug) { window.location.href = '/live-classes'; return; }
    try {
      const data = await lcApi.get(`/api/lc/teachers/${encodeURIComponent(teacherSlug)}`);
      render(data.teacher);
    } catch (e) {
      setHTML('hero-text', `<h1 class="hero-title" style="color:#C8A84B;">Not found</h1><p class="hero-subtitle">${lcFmt.esc(e.message)}</p>`);
    }
  }

  function render(t) {
    const L = t.landing || {};
    const accent = L.accent_color || '#C8362A';
    document.documentElement.style.setProperty('--accent-color', accent);

    document.title = `${t.name} — Live Classes · The Foundation Room`;

    const bookUrl = `/live-classes/${encodeURIComponent(t.slug)}/book`;
    const heroPhoto = L.hero_photo_full || t.photo_url || '';
    if (heroPhoto) document.getElementById('hero-artist').style.backgroundImage = `url('${heroPhoto}')`;

    // Hero text
    const titleLines = (L.hero_title_line1 || t.name) +
      (L.hero_title_line2 ? `<br>${lcFmt.esc(L.hero_title_line2)}` : '');
    setHTML('hero-text', `
      ${L.hero_eyebrow ? `<p class="hero-eyebrow">${lcFmt.esc(L.hero_eyebrow)}</p>` : ''}
      <h1 class="hero-title">${L.hero_title_line2 ? lcFmt.esc(L.hero_title_line1 || t.name) + '<br>' + lcFmt.esc(L.hero_title_line2) : lcFmt.esc(L.hero_title_line1 || t.name)}</h1>
      ${L.hero_tagline ? `<p class="hero-subtitle">${L.hero_tagline}</p>` : ''}
      ${L.hero_badge ? `<p class="hero-badge">${lcFmt.esc(L.hero_badge)}</p>` : ''}
      <a href="${bookUrl}" class="hero-cta">Book Your Slot →</a>
    `);

    // Trust strip
    if (Array.isArray(L.trust_strip) && L.trust_strip.length) {
      setHTML('trust-inner', L.trust_strip.map(t => `
        <div class="trust-item">
          <div class="trust-num">${lcFmt.esc(t.num || '')}</div>
          <div class="trust-label">${lcFmt.esc(t.label || '')}</div>
        </div>`).join(''));
      show('trust-strip');
    }

    // About
    if (L.about_title || L.about_body) {
      if (L.about_eyebrow) setText('about-eyebrow', L.about_eyebrow);
      setText('about-title', L.about_title || `About ${t.name}`);
      setText('about-body', L.about_body || t.bio || '');
      document.getElementById('about-cta').href = bookUrl;
      show('about-section');
    }

    // What you'll learn
    if (Array.isArray(L.what_you_learn) && L.what_you_learn.length) {
      setText('learn-title', L.what_you_learn_title || 'What you will learn');
      setHTML('learn-grid', L.what_you_learn.map(c => `
        <div class="learn-card">
          ${c.icon ? `<div class="learn-card-icon">${lcFmt.esc(c.icon)}</div>` : ''}
          <div class="learn-card-title">${lcFmt.esc(c.title || '')}</div>
          <div class="learn-card-body">${lcFmt.esc(c.body || '')}</div>
        </div>`).join(''));
      show('learn-section');
    }

    // Bottom CTA
    if (L.cta_title || L.cta_sub) {
      setText('cta-title', L.cta_title || 'Begin your training.');
      setText('cta-sub', L.cta_sub || '');
      document.getElementById('cta-btn').href = bookUrl;
      show('cta-section');
    }
  }

  load();
</script>
</body>
</html>
