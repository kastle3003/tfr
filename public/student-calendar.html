<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/assets/tfr-play/favicon-tfr.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — The Foundation Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/archive.css">
  <style>
    .cal-wrap { display: grid; grid-template-columns: 1fr 280px; gap: 24px; align-items: start; }
    @media(max-width:900px) { .cal-wrap { grid-template-columns: 1fr; } }

    /* Calendar */
    .cal-card { background: var(--bg-card); border: 1px solid rgba(200,168,75,0.12); border-radius: 14px; overflow: hidden; }
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px; border-bottom: 1px solid rgba(200,168,75,0.10);
    }
    .cal-nav h2 { font-family: var(--serif); font-size: 18px; color: var(--text); font-weight: 400; }
    .cal-nav-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: transparent; border: 1px solid rgba(200,168,75,0.20);
      color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s; font-family: var(--sans);
    }
    .cal-nav-btn:hover { background: rgba(200,168,75,0.10); color: var(--gold); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-day-name {
      text-align: center; padding: 10px 4px; font-size: 11px;
      font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em;
    }
    .cal-day {
      min-height: 80px; border-top: 1px solid rgba(200,168,75,0.07); border-right: 1px solid rgba(200,168,75,0.07);
      padding: 8px 6px; cursor: pointer; transition: background 0.12s; position: relative;
    }
    .cal-day:hover { background: rgba(200,168,75,0.04); }
    .cal-day.other-month { opacity: 0.3; }
    .cal-day.today .day-num {
      background: var(--gold); color: #0A0806; font-weight: 700;
      border-radius: 50%; width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
    }
    .day-num { font-size: 13px; color: var(--text-2); margin-bottom: 4px; display: inline-block; }
    .day-event {
      display: block; font-size: 10px; font-weight: 600;
      border-radius: 3px; padding: 2px 5px; margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .event-personal { background: rgba(42,74,107,0.4); color: #5EA0CF; }
    .event-masterclass { background: rgba(42,107,74,0.4); color: #5ECFA0; }
    .event-assignment { background: rgba(139,46,38,0.4); color: #CF8E5E; }

    /* Side panel */
    .side-panel { display: flex; flex-direction: column; gap: 16px; }
    .panel-card { background: var(--bg-card); border: 1px solid rgba(200,168,75,0.12); border-radius: 12px; padding: 18px; }
    .panel-card h3 { font-size: 12px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 14px; }
    .event-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid rgba(200,168,75,0.06); }
    .event-item:last-child { border-bottom: none; }
    .event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .event-info-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .event-info-time { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; color: var(--text-2); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* Add event form */
    .add-form { display: none; flex-direction: column; gap: 10px; margin-top: 10px; }
    .add-form.visible { display: flex; }
    .add-form input, .add-form textarea {
      background: var(--bg-2); border: 1.5px solid rgba(200,168,75,0.15);
      border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 13px;
      padding: 9px 12px; outline: none; transition: border-color 0.18s; width: 100%;
    }
    .add-form input:focus, .add-form textarea:focus {
      border-color: var(--gold); box-shadow: 0 0 0 3px rgba(200,168,75,0.10);
    }
    .add-form textarea { resize: vertical; min-height: 64px; }
    .form-actions { display: flex; gap: 8px; }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title">Calendar</h1>
      </div>
      <div class="topbar-right">
        <a href="/student-profile.html" class="topbar-avatar" id="topbar-avatar">—</a>
      </div>
    </header>

    <div class="content-area">
      <div class="cal-wrap">
        <!-- Calendar -->
        <div class="cal-card">
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button>
            <h2 id="cal-title">Loading...</h2>
            <button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button>
          </div>
          <div class="cal-grid" id="cal-grid">
            <div class="cal-day-name">Sun</div>
            <div class="cal-day-name">Mon</div>
            <div class="cal-day-name">Tue</div>
            <div class="cal-day-name">Wed</div>
            <div class="cal-day-name">Thu</div>
            <div class="cal-day-name">Fri</div>
            <div class="cal-day-name">Sat</div>
          </div>
        </div>

        <!-- Side panel -->
        <div class="side-panel">
          <!-- Upcoming events -->
          <div class="panel-card">
            <h3>Upcoming Events</h3>
            <div id="upcoming-list"><p style="font-size:13px;color:var(--text-3);">Loading...</p></div>
          </div>

          <!-- Add Event -->
          <div class="panel-card">
            <h3>Add Personal Event</h3>
            <button class="btn btn-primary btn-sm" style="width:100%;" onclick="toggleAddForm()">+ Add Event</button>
            <div class="add-form" id="add-form">
              <input type="text" id="ev-title" placeholder="Event title">
              <input type="datetime-local" id="ev-date">
              <textarea id="ev-desc" placeholder="Notes (optional)"></textarea>
              <div class="form-actions">
                <button class="btn btn-primary btn-sm" onclick="addEvent()">Save</button>
                <button class="btn btn-ghost btn-sm" onclick="toggleAddForm()">Cancel</button>
              </div>
            </div>
          </div>

          <!-- Legend -->
          <div class="panel-card">
            <h3>Legend</h3>
            <div class="legend-row"><div class="legend-dot" style="background:#2A4A6B;"></div>Personal Event</div>
            <div class="legend-row"><div class="legend-dot" style="background:#2A6B4A;"></div>Masterclass / Live Class</div>
            <div class="legend-row"><div class="legend-dot" style="background:#8B2E26;"></div>Assignment Due</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/assets/js/student-sidebar.js"></script>
<script>
  const token = localStorage.getItem('archive_token');
  if (!token) location.href = '/signin.html';

  let currentDate = new Date();
  let allEvents = [];

  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  async function init() {
    try {
      const me = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
      if (!me.ok) { localStorage.clear(); location.href = '/signin.html'; return; }
      document.dispatchEvent(new Event('userLoaded'));
      renderCalendar();
    } catch(e) { console.error(e); }
  }

  function getMonthStr() {
    const y = currentDate.getFullYear();
    const m = String(currentDate.getMonth() + 1).padStart(2, '0');
    return `${y}-${m}`;
  }

  async function renderCalendar() {
    const monthStr = getMonthStr();
    document.getElementById('cal-title').textContent =
      MONTH_NAMES[currentDate.getMonth()] + ' ' + currentDate.getFullYear();

    try {
      const res = await fetch(`/api/calendar?month=${monthStr}`, { headers: { Authorization: 'Bearer ' + token } });
      const data = await res.json();
      allEvents = data.events || [];
    } catch(e) { allEvents = []; }

    buildGrid();
    renderUpcoming();
  }

  function buildGrid() {
    const grid = document.getElementById('cal-grid');
    // Remove old day cells (keep day name headers)
    const headers = Array.from(grid.querySelectorAll('.cal-day-name'));
    grid.innerHTML = '';
    headers.forEach(h => grid.appendChild(h));

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrev = new Date(year, month, 0).getDate();
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

    // Previous month days
    for (let i = firstDay - 1; i >= 0; i--) {
      const cell = makeCell(daysInPrev - i, true, null);
      grid.appendChild(cell);
    }

    // Current month days
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEvents = allEvents.filter(e => (e.start_datetime || '').startsWith(dateStr));
      const isToday = dateStr === todayStr;
      const cell = makeCell(d, false, dayEvents, isToday, dateStr);
      grid.appendChild(cell);
    }

    // Next month filler
    const total = firstDay + daysInMonth;
    const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let i = 1; i <= remaining; i++) {
      const cell = makeCell(i, true, null);
      grid.appendChild(cell);
    }
  }

  function makeCell(day, otherMonth, events, isToday, dateStr) {
    const cell = document.createElement('div');
    cell.className = 'cal-day' + (otherMonth ? ' other-month' : '') + (isToday ? ' today' : '');
    const numSpan = document.createElement('div');
    numSpan.className = 'day-num';
    numSpan.textContent = day;
    cell.appendChild(numSpan);
    if (events && events.length) {
      events.slice(0, 3).forEach(ev => {
        const span = document.createElement('span');
        span.className = 'day-event ' + getEventClass(ev.source || ev.event_type);
        span.textContent = ev.title;
        cell.appendChild(span);
      });
      if (events.length > 3) {
        const more = document.createElement('span');
        more.className = 'day-event';
        more.style.color = 'var(--text-3)';
        more.textContent = `+${events.length - 3} more`;
        cell.appendChild(more);
      }
    }
    return cell;
  }

  function getEventClass(source) {
    if (source === 'masterclass' || source === 'live') return 'event-masterclass';
    if (source === 'assignment') return 'event-assignment';
    return 'event-personal';
  }

  function renderUpcoming() {
    const now = new Date().toISOString();
    const upcoming = allEvents
      .filter(e => (e.start_datetime || '') >= now)
      .slice(0, 6);
    const container = document.getElementById('upcoming-list');
    if (!upcoming.length) {
      container.innerHTML = '<p style="font-size:13px;color:var(--text-3);">No upcoming events this month.</p>';
      return;
    }
    container.innerHTML = upcoming.map(ev => {
      const color = ev.color || '#2A4A6B';
      const dt = new Date(ev.start_datetime);
      const timeStr = isNaN(dt) ? '' : dt.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) + (ev.all_day ? '' : ' · ' + dt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true }));
      return `<div class="event-item">
        <div class="event-dot" style="background:${color};"></div>
        <div>
          <div class="event-info-title">${ev.title}</div>
          <div class="event-info-time">${timeStr}</div>
        </div>
      </div>`;
    }).join('');
  }

  function changeMonth(dir) {
    currentDate.setMonth(currentDate.getMonth() + dir);
    renderCalendar();
  }

  function toggleAddForm() {
    const f = document.getElementById('add-form');
    f.classList.toggle('visible');
    if (f.classList.contains('visible')) {
      const now = new Date();
      now.setMinutes(0, 0, 0);
      document.getElementById('ev-date').value = now.toISOString().slice(0,16);
    }
  }

  async function addEvent() {
    const title = document.getElementById('ev-title').value.trim();
    const start = document.getElementById('ev-date').value;
    const desc = document.getElementById('ev-desc').value.trim();
    if (!title || !start) { alert('Title and date are required.'); return; }
    try {
      const res = await fetch('/api/calendar', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, start_datetime: start, description: desc || null, event_type: 'personal' })
      });
      if (!res.ok) { const d = await res.json(); alert(d.error || 'Failed'); return; }
      document.getElementById('ev-title').value = '';
      document.getElementById('ev-desc').value = '';
      toggleAddForm();
      renderCalendar();
    } catch(e) { alert('Network error'); }
  }

  init();
</script>
</body>
</html>
