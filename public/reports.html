<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports & Exports — The Foundation Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/archive.css">
  <style>
    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 8px;
    }

    .report-card {
      background: var(--bg-card);
      border: 1px solid rgba(200,168,75,0.12);
      border-radius: var(--radius-lg);
      padding: 26px;
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: border-color .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .report-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), transparent);
      opacity: 0;
      transition: opacity .2s;
    }
    .report-card:hover { border-color: rgba(200,168,75,0.28); box-shadow: 0 8px 28px rgba(0,0,0,.25); }
    .report-card:hover::before { opacity: 1; }

    .report-icon {
      width: 44px; height: 44px; border-radius: 10px;
      background: rgba(200,168,75,0.1);
      border: 1px solid rgba(200,168,75,0.2);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
      flex-shrink: 0;
    }
    .report-icon svg { width: 20px; height: 20px; stroke: var(--gold); }

    .report-title {
      font-family: var(--serif);
      font-style: italic;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .report-desc {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.6;
      flex: 1;
      margin-bottom: 16px;
    }

    .report-columns {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 20px;
    }
    .report-col-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .04em;
      color: rgba(200,168,75,0.7);
      background: rgba(200,168,75,0.07);
      border: 1px solid rgba(200,168,75,0.15);
      border-radius: 4px;
      padding: 2px 7px;
    }

    .report-meta {
      font-size: 11px;
      color: var(--text-3);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .report-count {
      font-family: var(--serif);
      font-size: 15px;
      font-weight: 600;
      color: var(--gold);
    }

    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 20px;
      background: var(--gold);
      color: #080706;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: background .2s, transform .15s;
      text-decoration: none;
    }
    .btn-download:hover { background: var(--gold-bright); transform: translateY(-1px); }
    .btn-download:active { transform: translateY(0); }
    .btn-download svg { width: 15px; height: 15px; stroke: currentColor; flex-shrink: 0; }
    .btn-download.loading { opacity: .6; pointer-events: none; }

    .section-intro {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.6;
      margin-bottom: 28px;
      max-width: 600px;
    }

    .last-export {
      font-size: 11px;
      color: var(--text-3);
      text-align: center;
      margin-top: 10px;
    }

    .scope-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .scope-badge.admin { background: rgba(191,0,0,.15); border: 1px solid rgba(191,0,0,.35); color: #e07870; }
    .scope-badge.instructor { background: rgba(200,168,75,.1); border: 1px solid rgba(200,168,75,.3); color: var(--gold); }
    .scope-badge svg { width: 11px; height: 11px; stroke: currentColor; }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-title">Reports &amp; Exports</div>
      <div class="topbar-actions">
        <div class="topbar-avatar" id="topbar-avatar">—</div>
      </div>
    </header>

    <main class="main-content">

      <div id="scope-badge-wrap"></div>

      <p class="section-intro">
        Download your data as CSV spreadsheets — compatible with Microsoft Excel, Google Sheets, and any spreadsheet tool.
        All exports reflect real-time data at the moment of download.
      </p>

      <div class="reports-grid" id="reports-grid">
        <!-- Cards injected by JS -->
        <div class="skeleton" style="height:320px;border-radius:12px;"></div>
        <div class="skeleton" style="height:320px;border-radius:12px;"></div>
        <div class="skeleton" style="height:320px;border-radius:12px;"></div>
      </div>

    </main>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth-guard.js"></script>
<script>requireRole(['instructor', 'admin']);</script>
<script>
  let _role = 'instructor';

  function toast(msg, type = 'success') {
    const tc = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type === 'error' ? 'error' : ''}`;
    t.textContent = msg;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  document.addEventListener('userLoaded', (e) => {
    const user = e.detail || {};
    _role = user.role || 'instructor';

    const initials = user.avatar_initials ||
      (((user.first_name || '')[0] || '') + ((user.last_name || '')[0] || '')).toUpperCase() || '?';
    document.getElementById('topbar-avatar').textContent = initials;

    // Scope badge
    const badge = document.getElementById('scope-badge-wrap');
    if (_role === 'admin') {
      badge.innerHTML = `<div class="scope-badge admin">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Admin — viewing all data
      </div>`;
    } else {
      badge.innerHTML = `<div class="scope-badge instructor">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M12 14c-4 0-8 2-8 6v2h16v-2c0-4-4-6-8-6z"/></svg>
        Instructor — your students &amp; courses only
      </div>`;
    }

    // Load sidebar
    const script = document.createElement('script');
    script.src = _role === 'admin' ? '/assets/js/admin-sidebar.js' : '/assets/js/instructor-sidebar.js';
    document.body.appendChild(script);

    loadPreview();
  });

  async function loadPreview() {
    try {
      const data = await api.get('/api/export/preview');
      renderCards(data);
    } catch (err) {
      renderCards({ students: '?', enrollments: '?', payments: '?' });
    }
  }

  function renderCards(counts) {
    const grid = document.getElementById('reports-grid');
    const token = localStorage.getItem('archive_token') || '';

    const cards = [
      {
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
        title: 'Student Profiles',
        desc: 'Complete contact information, instrument, bio, practice goal, and all social links for every student.',
        columns: ['ID', 'Name', 'Email', 'Phone', 'Location', 'Instrument', 'Bio', 'Member Since', 'Practice Goal', 'Social Links (11 platforms)'],
        count: counts.students,
        label: 'students',
        endpoint: '/api/export/students',
        filename: 'students_profiles.csv',
      },
      {
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
        title: 'Enrollments Report',
        desc: 'Every enrollment with student profile, course details, progress status, and payment information all in one sheet.',
        columns: ['Student', 'Email', 'Phone', 'Course', 'Level', 'Instructor', 'Enrolled', 'Last Accessed', 'Progress %', 'Status', 'Payment', 'Amount (INR)', 'Payment Date'],
        count: counts.enrollments,
        label: 'enrollments',
        endpoint: '/api/export/enrollments',
        filename: 'enrollments_report.csv',
      },
      {
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>`,
        title: 'Payments Report',
        desc: 'All payment transactions with student contact details, amounts, statuses, and Razorpay reference IDs.',
        columns: ['Payment ID', 'Date', 'Student Name', 'Email', 'Phone', 'Course', 'Amount (INR)', 'Currency', 'Status', 'Razorpay Order ID', 'Razorpay Payment ID'],
        count: counts.payments,
        label: 'payments',
        endpoint: '/api/export/payments',
        filename: 'payments_report.csv',
      },
    ];

    grid.innerHTML = cards.map(c => `
      <div class="report-card">
        <div class="report-icon">${c.icon}</div>
        <div class="report-title">${c.title}</div>
        <div class="report-desc">${c.desc}</div>
        <div class="report-columns">
          ${c.columns.map(col => `<span class="report-col-tag">${col}</span>`).join('')}
        </div>
        <div class="report-meta">
          <span class="report-count">${c.count}</span>
          <span>${c.label} ready to export</span>
        </div>
        <button class="btn-download" onclick="downloadCSV('${c.endpoint}', '${c.filename}', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download CSV
        </button>
        <div class="last-export" id="last-${c.filename}"></div>
      </div>
    `).join('');
  }

  async function downloadCSV(endpoint, filename, btn) {
    btn.classList.add('loading');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg> Preparing…`;

    try {
      const token = localStorage.getItem('archive_token') || '';
      const res = await fetch(endpoint, { headers: { Authorization: 'Bearer ' + token } });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || 'Export failed');
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      const now = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const meta = document.getElementById('last-' + filename);
      if (meta) meta.textContent = `Last downloaded at ${now}`;

      toast(`${filename} downloaded!`);
    } catch (err) {
      toast(err.message || 'Download failed', 'error');
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download CSV`;
    }
  }
</script>
</body>
</html>
