<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/assets/tfr-play/favicon-tfr.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Room · The Foundation Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:         #080706;
    --ink-soft:    #0f0e0c;
    --ink-mid:     #1a1916;
    --gold:        #C8A84B;
    --gold-bright: #E8C96E;
    --gold-dim:    #7A6830;
    --cream:       #F0E6D3;
    --cream-dim:   #b8ad9e;
    --border:      rgba(200,168,75,0.12);
    --border-hi:   rgba(200,168,75,0.28);
    --ghost:       rgba(200,168,75,0.04);
    --ghost-mid:   rgba(200,168,75,0.08);
    --font-display: 'Libre Baskerville', Baskerville, 'Baskerville Old Face', Georgia, serif;
    --font-body:    'DM Sans', -apple-system, sans-serif;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-x: clip; }
  body {
    background: var(--ink);
    color: var(--cream);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }

  /* ── Top bar ── */
  nav {
    display: flex; align-items: center; gap: 14px;
    padding: 0 28px;
    height: 64px;
    border-bottom: 1px solid var(--border);
    background: var(--ink-soft);
    position: sticky; top: 0; z-index: 10;
  }
  .nav-back {
    display: flex; align-items: center; gap: 8px;
    color: var(--cream-dim); font-size: 13px;
    transition: color .15s;
  }
  .nav-back:hover { color: var(--cream); }
  .nav-back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
  .nav-spacer { flex: 1; }
  .nav-crumb {
    font-size: 12px; color: var(--cream-dim); letter-spacing: .08em; text-transform: uppercase;
  }
  .nav-crumb strong { color: var(--gold); font-weight: 500; }

  /* ── Layout ── */
  .wrap {
    flex: 1;
    display: flex; flex-direction: column;
    padding: 32px 40px;
    max-width: 1600px;
    width: 100%;
    margin: 0 auto;
  }
  .header {
    margin-bottom: 20px;
  }
  .eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: .25em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 10px;
  }
  .title {
    font-family: var(--font-display); font-size: clamp(32px, 4.5vw, 52px);
    font-weight: 600; line-height: 1.05; color: var(--cream);
  }
  .title em { color: var(--gold); font-style: normal; font-weight: 500; }
  .subtitle {
    margin-top: 8px;
    font-size: 14px; color: var(--cream-dim); letter-spacing: .02em;
  }

  /* ── Player ── */
  .player-wrap {
    position: relative;
    background: #000;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .player-wrap video {
    display: block;
    width: 100%;
    max-height: calc(100vh - 260px);
    background: #000;
  }
  .player-wrap.empty {
    aspect-ratio: 16 / 9;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    padding: 40px;
    text-align: center;
  }
  .player-wrap.empty svg { width: 48px; height: 48px; color: var(--gold-dim); stroke: currentColor; fill: none; stroke-width: 1.5; }
  .player-wrap.empty h3 {
    font-family: var(--font-display); font-size: 24px; font-weight: 500; color: var(--cream);
  }
  .player-wrap.empty p { font-size: 13px; color: var(--cream-dim); max-width: 360px; }

  /* ── Controls strip below player ── */
  .controls {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 18px;
    background: var(--ghost);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    flex-wrap: wrap;
  }
  .control-label {
    font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
    color: var(--cream-dim);
  }
  .speed-select {
    background: var(--ink-mid);
    color: var(--cream);
    border: 1px solid var(--border-hi);
    border-radius: 3px;
    padding: 6px 10px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  .speed-select:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
  .tip {
    font-size: 12px; color: var(--cream-dim);
    font-style: normal;
  }
  .tip strong { color: var(--gold); font-style: normal; font-weight: 600; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    nav { padding: 0 16px; height: 56px; }
    .wrap { padding: 22px 18px; }
    .title { font-size: clamp(26px, 8vw, 40px); }
    .nav-crumb { display: none; }
    .controls { padding: 12px 14px; gap: 12px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-back" href="#" id="back-link">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    <span id="back-label">Back</span>
  </a>
  <div class="nav-spacer"></div>
  <div class="nav-crumb" id="crumb"></div>
</nav>

<div class="wrap">
  <div class="header">
    <p class="eyebrow">Practice Room</p>
    <h1 class="title" id="page-title">Follow along</h1>
    <p class="subtitle" id="page-subtitle"></p>
  </div>

  <div class="player-wrap" id="player-wrap">
    <!-- filled by JS: either a <video> or an empty-state panel -->
  </div>

  <div class="controls" id="controls" style="display:none;">
    <span class="control-label">Playback Speed</span>
    <select class="speed-select" id="speed-select">
      <option value="0.5">0.5×</option>
      <option value="0.75">0.75×</option>
      <option value="1" selected>Normal</option>
      <option value="1.25">1.25×</option>
      <option value="1.5">1.5×</option>
      <option value="2">2×</option>
    </select>
    <span class="tip">Use <strong>←/→</strong> to scrub 5s · <strong>Space</strong> to pause</span>
  </div>
</div>

<script>
  // Read chapter id from /practice/:chapterId
  const parts = window.location.pathname.split('/').filter(Boolean);
  const chapterId = parts[parts.indexOf('practice') + 1];

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function renderEmpty() {
    document.getElementById('player-wrap').classList.add('empty');
    document.getElementById('player-wrap').innerHTML = `
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      <h3>Practice Room not yet available</h3>
      <p>The instructor hasn't uploaded a practice video for this chapter yet. Check back soon.</p>
    `;
  }

  function renderVideo(url) {
    const wrap = document.getElementById('player-wrap');
    wrap.classList.remove('empty');
    const isIframeHost = /youtube\.com|youtu\.be|vimeo\.com/i.test(url);
    if (isIframeHost) {
      wrap.innerHTML = `<iframe src="${esc(url)}" style="width:100%;height:60vh;border:0;" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
      return;
    }
    wrap.innerHTML = `
      <video
        src="${esc(url)}"
        controls
        controlsList="nodownload noplaybackrate"
        disablepictureinpicture
        playsinline
        oncontextmenu="return false;"
      ></video>
    `;
    const v = wrap.querySelector('video');
    document.getElementById('controls').style.display = 'flex';
    const speed = document.getElementById('speed-select');
    speed.addEventListener('change', () => { v.playbackRate = parseFloat(speed.value) || 1; });
  }

  (async () => {
    if (!chapterId || !/^\d+$/.test(chapterId)) {
      renderEmpty();
      return;
    }
    try {
      const r = await fetch('/api/public/chapters/' + chapterId + '/practice');
      if (!r.ok) { renderEmpty(); return; }
      const data = await r.json();

      // Title + context
      const chapterTitle = data.chapter_title || 'Practice';
      const courseTitle = data.course_title || '';
      const practiceTitle = data.practice_video_title || chapterTitle;
      document.title = `${practiceTitle} · Practice Room · TFR`;
      document.getElementById('page-title').innerHTML = esc(practiceTitle) + ' <em>practice</em>';
      const subParts = [];
      if (courseTitle) subParts.push(courseTitle);
      if (data.instructor_name) subParts.push('with ' + data.instructor_name);
      document.getElementById('page-subtitle').textContent = subParts.join(' · ');
      document.getElementById('crumb').innerHTML = `<strong>${esc(courseTitle)}</strong> · ${esc(chapterTitle)}`;

      // Back link → course landing
      if (data.course_slug) {
        const back = document.getElementById('back-link');
        back.setAttribute('href', '/courses/' + encodeURIComponent(data.course_slug));
        document.getElementById('back-label').textContent = 'Back to course';
      }

      if (data.practice_video_url) {
        renderVideo(data.practice_video_url);
      } else {
        renderEmpty();
      }
    } catch (e) {
      renderEmpty();
    }
  })();
</script>
</body>
</html>
